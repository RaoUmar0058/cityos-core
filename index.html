<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityOS v5 — Smart Simulator</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #6366f1; --acc: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; padding: 0; overflow: hidden; height: 100vh; background: #060912; color: #f1f5f9; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; transition: background 0.5s ease; }
        .sidebar { width: 300px; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; backdrop-filter: blur(20px); border-right: 1px solid; transition: all 0.5s; flex-shrink: 0; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid; }
        
        /* 3D Isometric Viewport Grid */
        .world-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: rgba(0,0,0,0.2); }
        .grid-isometric { display: grid; grid-template-columns: repeat(10, 44px); grid-template-rows: repeat(10, 44px); gap: 4px; transform: rotateX(55deg) rotateZ(-45deg); transform-style: preserve-3d; transition: all 0.4s ease; padding: 20px; }
        
        .bld-btn { width: 100%; border: none; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; cursor: pointer; }
        .bld-btn:hover:not(:disabled) { transform: translateX(3px); }
        
        .tile-container { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        
        /* Interactive Welcome Overlay */
        .welcome-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #0b0f19 0%, #03050a 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .welcome-panel { background: rgba(10, 15, 30, 0.8); border: 2px solid #6366f1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); border-radius: 20px; padding: 40px; max-width: 500px; backdrop-filter: blur(10px); animation: panelPulse 4s infinite alternate; }
        
        /* Disappearing Strategic Hint Overlay */
        .timed-hint { position: absolute; top: 80px; right: 25px; background: rgba(15, 23, 42, 0.9); border-left: 4px solid #fbbf24; box-shadow: 0 10px 25px rgba(0,0,0,0.5); padding: 15px; borderRadius: 10px; border-radius: 8px; width: 280px; z-index: 500; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* Level End / Reward Screen Overlay */
        .level-modal { position: fixed; inset: 0; background: rgba(3, 5, 10, 0.85); backdrop-filter: blur(8px); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .level-card { background: linear-gradient(145deg, #111827, #030712); border: 2px solid #10b981; box-shadow: 0 0 40px rgba(16, 185, 129, 0.4); border-radius: 20px; padding: 35px; width: 340px; text-align: center; animation: modalPop 0.3s ease-out; }

        @keyframes panelPulse { from { border-color: #6366f1; box-shadow: 0 0 25px rgba(99,102,241,0.2); } to { border-color: #a78bfa; box-shadow: 0 0 40px rgba(167,139,250,0.45); } }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes modalPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis } = window.Recharts || {};
        const { useState, useEffect, useCallback, useRef } = React;

        // ═══════════════════════════════════════════════════════════════
        // AUDIO SYNTHESIZER ENGINE (Web Audio API)
        // ═══════════════════════════════════════════════════════════════
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'build') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.12);
                    osc.start(); osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'demolish') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'levelup') {
                    // Arpeggio chime sequence
                    [523.25, 659.25, 783.99, 1046.50].forEach((freq, idx) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'triangle';
                        o.frequency.setValueAtTime(freq, ctx.currentTime + (idx * 0.08));
                        g.gain.setValueAtTime(0.15, ctx.currentTime + (idx * 0.08));
                        g.gain.linearRampToValueAtTime(0, ctx.currentTime + (idx * 0.08) + 0.3);
                        o.start(ctx.currentTime + (idx * 0.08));
                        o.stop(ctx.currentTime + (idx * 0.08) + 0.3);
                    });
                } else if (type === 'error') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.setValueAtTime(120, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                }
            } catch (e) { console.log("Audio not allowed yet context blocks:", e); }
        };

        // ═══════════════════════════════════════════════════════════════
        // ENGINE DATA & GAME CONFIG
        // ═══════════════════════════════════════════════════════════════
        const GRID_COLS = 10;
        const GRID_SIZE = GRID_COLS * GRID_COLS;
        const SAVE_KEY  = "cityos_v5_pro";
        const STARTING_COINS = 800;

        const BUILDINGS = {
          TREE:     { id:"TREE",     label:"Oak Tree",      icon:"🌳", cost:20,  beauty:10, oxygen:8,  pollution:-6,  traffic:0,  energy:2,  population:0,  color:"#4ade80", unlockAt:0 },
          ROAD:     { id:"ROAD",     label:"Smart Road",    icon:"🛣️", cost:30,  beauty:2,  oxygen:-2, pollution:4,   traffic:-10,energy:-2, population:0,  color:"#94a3b8", unlockAt:0 },
          HOUSE:    { id:"HOUSE",    label:"Modern Villa",  icon:"🏠", cost:100, beauty:15, oxygen:-1, pollution:3,   traffic:4,  energy:-5, population:15, color:"#60a5fa", unlockAt:0 },
          PARK:     { id:"PARK",     label:"City Park",     icon:"🌿", cost:50,  beauty:20, oxygen:12, pollution:-10, traffic:-3, energy:3,  population:5,  color:"#86efac", unlockAt:0 },
          SOLAR:    { id:"SOLAR",    label:"Solar Farm",    icon:"☀️", cost:120, beauty:5,  oxygen:4,  pollution:-15, traffic:0,  energy:25, population:2,  color:"#fbbf24", unlockAt:3 },
          FACTORY:  { id:"FACTORY",  label:"Factory",       icon:"🏭", cost:150, beauty:-5, oxygen:-12,pollution:18,  traffic:8,  energy:15, population:10, color:"#fb923c", unlockAt:5 },
          HOSPITAL: { id:"HOSPITAL", label:"Health Center", icon:"🏥", cost:200, beauty:8,  oxygen:2,  pollution:-4,  traffic:6,  energy:-8, population:25, color:"#f43f5e", unlockAt:8 },
          SCHOOL:   { id:"SCHOOL",   label:"Academy",       icon:"🏫", cost:180, beauty:12, oxygen:3,  pollution:-3,  traffic:4,  energy:-6, population:12, color:"#c084fc", unlockAt:10 },
          MOSQUE:   { id:"MOSQUE",   label:"Grand Mosque",  icon:"🕌", cost:250, beauty:30, oxygen:2,  pollution:-2,  traffic:3,  energy:-3, population:8,  color:"#a78bfa", unlockAt:12 },
          TOWER:    { id:"TOWER",    label:"Cyber Tower",   icon:"🏙️", cost:300, beauty:20, oxygen:-5, pollution:8,   traffic:10, energy:-15,population:50, color:"#38bdf8", unlockAt:15 },
          FASHION:  { id:"FASHION",  label:"Fashion Hub ✦", icon:"👗", cost:400, beauty:40, oxygen:1,  pollution:-5,  traffic:8,  energy:-10,population:30, color:"#f472b6", unlockAt:18 },
        };

        const HINTS = [
          { title: "💡 Pro Optimization", text: "Trees and Parks reduce local Pollution indexes significantly. Mix them near factories!" },
          { title: "⚡ Grid Alert", text: "Cyber Towers and Fashion Hubs consume extreme amounts of Energy. Make sure Solar Farms are up." },
          { title: "🛣️ Traffic Jam", text: "As population grows, traffic limits your efficiency index. Place Smart Roads to balance layout load." },
          { title: "💰 Economy Tip", text: "Demolishing an existing structure returns 50% of its configuration costs directly to bank." }
        ];

        const MISSIONS = [
          { id:"m1", title:"Green Starter",    desc:"Plant 3 Trees",            icon:"🌳", check:(g,s)=>g.filter(c=>c==="TREE").length>=3,   reward:100 },
          { id:"m2", title:"Clean Air Act",    desc:"Reduce pollution below 35%", icon:"💨", check:(g,s)=>s.pollution<35,                       reward:150 },
          { id:"m3", title:"City Builder",     desc:"Reach 50 population",        icon:"👥", check:(g,s)=>s.population>=50,                     reward:200 },
          { id:"m4", title:"Energy Surplus",   desc:"Energy above 60%",           icon:"⚡", check:(g,s)=>s.energy>60,                         reward:180 }
        ];

        const THEMES = {
          dark: {
            bg:         "linear-gradient(160deg,#060912 0%,#0f172a 55%,#0c0a1e 100%)",
            sidebar:    "rgba(8,12,28,0.97)", sidebarBdr: "rgba(99,102,241,0.18)",
            glass:      "rgba(8,12,28,0.88)", glassBdr:   "rgba(99,102,241,0.18)",
            cellTop:    "#1a2540", cellLeft:"#121c32", cellRight:"#0d1626",
            text:       "#f1f5f9", textSub:"#94a3b8", textMuted:"#475569",
            barBg:      "rgba(255,255,255,0.06)", chartCard:  "rgba(255,255,255,0.03)",
            gridFilter: "saturate(1.25) brightness(1.06)"
          },
          light: {
            bg:         "linear-gradient(160deg,#f0f4ff 0%,#fafafe 45%,#f5f0ff 100%)",
            sidebar:    "rgba(255,255,255,0.85)", sidebarBdr: "rgba(99,102,241,0.1)",
            glass:      "rgba(255,255,255,0.85)", glassBdr:   "rgba(99,102,241,0.12)",
            cellTop:    "#f1f5f9", cellLeft:"#dde6f0", cellRight:"#c8d5e8",
            text:       "#1e1b4b", textSub:"#475569", textMuted:"#94a3b8",
            barBg:      "rgba(0,0,0,0.06)", chartCard:  "rgba(255,255,255,0.78)",
            gridFilter: "none"
          }
        };

        function computeStats(grid) {
          let oxygen=40, beauty=30, pollution=20, traffic=30, energy=50, population=0, score=0;
          grid.forEach(cell => {
            if(!cell) return;
            const b = BUILDINGS[cell];
            if(!b) return;
            oxygen = Math.max(0, Math.min(100, oxygen + b.oxygen));
            beauty = Math.max(0, Math.min(100, beauty + b.beauty));
            pollution = Math.max(0, Math.min(100, pollution + b.pollution));
            traffic = Math.max(0, Math.min(100, traffic + b.traffic));
            energy = Math.max(0, Math.min(100, energy + b.energy));
            population += b.population; 
            score += 10 + b.beauty;
          });
          const livability = Math.round((oxygen + beauty + (100 - pollution) + (100 - traffic) + energy) / 5);
          const sustainability = Math.round(oxygen * 0.35 + (100 - pollution) * 0.35 + energy * 0.3);
          return { oxygen, beauty, pollution, traffic, energy, population, score, livability, sustainability };
        }

        // ═══════════════════════════════════════════════════════════════
        // COMPONENTS
        // ═══════════════════════════════════════════════════════════════
        function IsoCell({ building, selected, onClick, onRightClick, isNight, t, sizePx }) {
          const [hov, setHov] = useState(false);
          const b = building ? BUILDINGS[building] : null;
          const sel = BUILDINGS[selected];
          
          return (
            <div 
              className="tile-container"
              style={{ position:"relative", width:sizePx, height:sizePx }}
              onMouseEnter={() => setHov(true)}
              onMouseLeave={() => setHov(false)}
              onClick={onClick}
              onContextMenu={(e) => { e.preventDefault(); onRightClick(); }}
            >
              <div style={{ position:"absolute", inset:0, transform:"rotateX(52deg)", transformStyle:"preserve-3d" }}>
                <div style={{
                  position:"absolute", inset:0, borderRadius: 4,
                  background: hov && !building ? `${sel.color}33` : building ? (isNight?"#1e293b":"#f1f5f9") : t.cellTop,
                  border: `1px solid ${hov ? (b||sel).color : (isNight?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)")}`,
                  transition: "all 0.15s"
                }}/>
                <div style={{ position:"absolute", bottom:-5, left:0, right:"50%", height:5, background:t.cellLeft, transformOrigin:"top", transform:"rotateX(-90deg) translateY(-50%)" }}/>
                <div style={{ position:"absolute", bottom:-5, left:"50%", right:0, height:5, background:t.cellRight, transformOrigin:"top", transform:"rotateX(-90deg) translateY(-50%)" }}/>
              </div>
              <div style={{
                position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center",
                fontSize: sizePx * 0.55, zIndex:2, transform: hov ? "translateY(-5px)" : "translateY(-1px)", transition:"all 0.2s",
              }}>{building ? b.icon : (hov ? sel.icon : "")}</div>
            </div>
          );
        }

        function StatBar({ label, val, color, icon, t }) {
          return (
            <div style={{ marginBottom:6 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginBottom:2 }}>
                <span style={{ color:t.textSub }}>{icon} {label}</span>
                <span style={{ fontWeight:700, color }}>{Math.round(val)}%</span>
              </div>
              <div style={{ background:t.barBg, height:4, borderRadius:4, overflow:"hidden" }}>
                <div style={{ width:`${Math.max(0, Math.min(100, val))}%`, height:"100%", background:color, transition:"width 0.4s" }}/>
              </div>
            </div>
          );
        }

        // ═══════════════════════════════════════════════════════════════
        // MAIN APP CONTROLLER
        // ═══════════════════════════════════════════════════════════════
        const CityApp = () => {
          const [showWelcome, setShowWelcome] = useState(true);
          const [themeMode, setThemeMode] = useState("dark");
          const [grid, setGrid] = useState(() => {
            const saved = localStorage.getItem(SAVE_KEY);
            return saved ? JSON.parse(saved).grid : Array(GRID_SIZE).fill(null);
          });
          const [coins, setCoins] = useState(() => {
            const saved = localStorage.getItem(SAVE_KEY);
            return saved ? JSON.parse(saved).coins : STARTING_COINS;
          });
          const [moveCount, setMoveCount] = useState(() => {
            const saved = localStorage.getItem(SAVE_KEY);
            return saved ? JSON.parse(saved).moveCount : 0;
          });
          
          // Progression Engine State Variables
          const [currentLevel, setCurrentLevel] = useState(1);
          const [showLevelModal, setShowLevelModal] = useState(false);
          const [activeHint, setActiveHint] = useState(null);

          const [selected, setSelected] = useState("TREE");
          const [tab, setTab] = useState("build");
          const [history, setHistory] = useState([]);

          const t = THEMES[themeMode];
          const stats = computeStats(grid);

          // Calculate Dynamic Leveling Bracket
          const levelCalculation = Math.floor(moveCount / 8) + 1;

          // Track leveling changes for reward prompts
          useEffect(() => {
              if (moveCount > 0 && levelCalculation > currentLevel) {
                  setCurrentLevel(levelCalculation);
                  setCoins(c => c + 350); // level reward
                  setShowLevelModal(true);
                  playSound('levelup');
              }
          }, [levelCalculation, moveCount, currentLevel]);

          // Loop Interval Engine for Mid-game Strategic Hints (Visible for 10 Sec every 40 Sec)
          useEffect(() => {
              const triggerHintLoop = setInterval(() => {
                  const randomHint = HINTS[Math.floor(Math.random() * HINTS.length)];
                  setActiveHint(randomHint);
                  
                  setTimeout(() => {
                      setActiveHint(null);
                  }, 10000); // 10 seconds lifespan

              }, 40000); // Run every 40 seconds
              return () => clearInterval(triggerHintLoop);
          }, []);

          useEffect(() => {
            localStorage.setItem(SAVE_KEY, JSON.stringify({ grid, coins, moveCount }));
          }, [grid, coins, moveCount]);

          const buildCell = (index) => {
            const b = BUILDINGS[selected];
            if (grid[index] === selected) return;
            if (coins < b.cost && !grid[index]) {
                playSound('error');
                return;
            }

            setHistory(prev => [...prev, { grid, coins, moveCount }]);
            const newGrid = [...grid];
            let coinDiff = 0;

            if (newGrid[index]) {
              const oldB = BUILDINGS[newGrid[index]];
              coinDiff += Math.round(oldB.cost * 0.5); 
            }
            
            coinDiff -= b.cost;
            newGrid[index] = selected;

            setGrid(newGrid);
            setCoins(c => c + coinDiff);
            setMoveCount(m => m + 1);
            playSound('build');
          };

          const removeCell = (index) => {
            if (!grid[index]) return;
            setHistory(prev => [...prev, { grid, coins, moveCount }]);
            
            const newGrid = [...grid];
            const oldB = BUILDINGS[newGrid[index]];
            
            newGrid[index] = null;
            setGrid(newGrid);
            setCoins(c => c + Math.round(oldB.cost * 0.5));
            setMoveCount(m => m + 1);
            playSound('demolish');
          };

          const undo = () => {
            if (!history.length) return;
            const previous = history[history.length - 1];
            setGrid(previous.grid);
            setCoins(previous.coins);
            setMoveCount(previous.moveCount);
            setHistory(prev => prev.slice(0, -1));
          };

          const resetGame = () => {
            if(window.confirm("Kya aap poori city clear karna chahte hain?")) {
              setGrid(Array(GRID_SIZE).fill(null));
              setCoins(STARTING_COINS);
              setMoveCount(0);
              setCurrentLevel(1);
              setHistory([]);
            }
          };

          const completedM = MISSIONS.filter(m => m.check(grid, stats)).map(m => m.id);

          const barData = [
            { name: 'O2', value: stats.oxygen },
            { name: 'Beauty', value: stats.beauty },
            { name: 'Energy', value: stats.energy },
            { name: 'Traffic', value: stats.traffic },
            { name: 'Pollution', value: stats.pollution }
          ];

          return (
            <div className="app-container" style={{ background: t.bg, color: t.text }}>
              
              {/* WELCOME INTRO SCREEN OVERLAY */}
              {showWelcome && (
                  <div className="welcome-screen">
                      <div className="welcome-panel">
                          <h1 style={{ fontFamily: "'Syne', sans-serif", fontSize: 32, fontWeight: 800, color: "#6366f1", marginBottom: 10 }}>CITYOS v5 CORE</h1>
                          <p style={{ fontSize: 13, color: "#94a3b8", lineHeight: 1.5, marginBottom: 25 }}>
                              Welcome to the next-generation isometric simulation matrix. Monitor real-time environment metrics, unlock advanced structural tech, and optimize infrastructure architecture.
                          </p>
                          <button onClick={() => { setShowWelcome(false); playSound('levelup'); }} style={{
                              background: "linear-gradient(135deg, #6366f1, #7c3aed)", color: "#fff", border: "none",
                              padding: "12px 30px", borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: "pointer", boxShadow: "0 5px 15px rgba(99,102,241,0.4)"
                          }}>
                              INITIALIZE CORE TERMINAL
                          </button>
                      </div>
                  </div>
              )}

              {/* TIMED MID-GAME STRATEGIC HINT BOX */}
              {activeHint && (
                  <div className="timed-hint">
                      <h4 style={{ color: "#fbbf24", fontSize: 11, fontWeight: 800, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>{activeHint.title}</h4>
                      <p style={{ fontSize: 10, color: "#cbd5e1", lineHeight: 1.4 }}>{activeHint.text}</p>
                  </div>
              )}

              {/* LEVEL END UPGRADE / REWARD MODAL */}
              {showLevelModal && (
                  <div className="level-modal">
                      <div className="level-card">
                          <span style={{ fontSize: 45 }}>🏆</span>
                          <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, color: "#10b981", marginTop: 10 }}>LEVEL UPGRADED!</h2>
                          <p style={{ fontSize: 12, color: "#94a3b8", margin: "10px 0 20px 0" }}>
                              Congratulations, Architecture Matrix advanced to <b>Level {currentLevel}</b>.
                          </p>
                          <div style={{ background: "rgba(16,185,129,0.1)", padding: 12, borderRadius: 10, border: "1px solid rgba(16,185,129,0.3)", marginBottom: 20 }}>
                              <span style={{ fontSize: 11, color: "#10b981", fontWeight: 700, display: "block" }}>REWARDS GRANTED:</span>
                              <span style={{ fontSize: 15, fontWeight: 800, color: "#fff" }}>💰 +350 Core Coins</span>
                          </div>
                          <button onClick={() => setShowLevelModal(false)} style={{
                              width: "100%", padding: 10, border: "none", background: "#10b981", color: "#fff",
                              borderRadius: 8, fontWeight: 700, cursor: "pointer"
                          }}>
                              CLAIM REWARDS
                          </button>
                      </div>
                  </div>
              )}

              {/* LEFT DASHBOARD PANEL */}
              <div className="sidebar" style={{ background: t.sidebar, borderColor: t.sidebarBdr }}>
                <div>
                  <h2 style={{ fontFamily:"'Syne', sans-serif", fontSize:20, fontWeight:800 }}>🌃 CityOS Core</h2>
                  <p style={{ fontSize:9, color:t.textMuted, fontFamily:"'DM Mono'", letterSpacing:1 }}>ARCHITECTURE CONSOLE</p>
                </div>

                {/* Level Progress Display Indicator */}
                <div style={{ background:"rgba(99,102,241,0.08)", padding:10, borderRadius:12, border:"1px solid rgba(99,102,241,0.2)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, fontWeight:700, color:"#6366f1", marginBottom:4 }}>
                    <span>PLANNER LEVEL {currentLevel}</span>
                    <span>{moveCount % 8}/8 Moves to Next Rank</span>
                  </div>
                  <div style={{ background:"rgba(255,255,255,0.1)", height:5, borderRadius:99, overflow:"hidden" }}>
                    <div style={{ width:`${(moveCount % 8) * 12.5}%`, height:"100%", background:"#6366f1", transition: "width 0.3s" }}/>
                  </div>
                </div>

                <div style={{ background: "linear-gradient(135deg,#4f46e5,#7c3aed)", padding:12, borderRadius:14, color:"#fff" }}>
                  <span style={{ fontSize:9, opacity:0.7, fontFamily:"'DM Mono'" }}>AVAILABLE EXPENSE</span>
                  <h2 style={{ fontSize:22, fontWeight:800 }}>💰 {coins} Coins</h2>
                  <div style={{ display:"flex", gap:15, marginTop:8, fontSize:10, opacity:0.9 }}>
                    <div>👥 Pop: <b>{stats.population}</b></div>
                    <div>⚡ Score: <b>{stats.score}</b></div>
                    <div>🛠️ Moves: <b>{moveCount}</b></div>
                  </div>
                </div>

                <div style={{ background: t.chartCard, padding:10, borderRadius:12, border:`1px solid ${t.sidebarBdr}` }}>
                  <span style={{ fontSize:9, color:t.textMuted }}>LIVABILITY INDEX</span>
                  <h3 style={{ fontSize:16, color:"#10b981", fontFamily:"'Syne'" }}>{stats.livability}% 🌟 Stable</h3>
                </div>

                <div style={{ display:"flex", gap:4 }}>
                  <button onClick={undo} disabled={!history.length} style={{ flex:1, padding:6, fontSize:10, borderRadius:6, cursor:"pointer" }}>↩ Undo</button>
                  <button onClick={resetGame} style={{ flex:1, padding:6, fontSize:10, borderRadius:6, cursor:"pointer", background:"#ef4444", color:"#fff", border:"none" }}>🔄 Clear All</button>
                </div>

                <div style={{ display:"flex", gap:4, background:"rgba(0,0,0,0.1)", padding:2, borderRadius:8 }}>
                  {["build", "missions", "analytics"].map(tb => (
                    <button key={tb} onClick={() => setTab(tb)} style={{ flex:1, padding:"6px 2px", fontSize:10, textTransform:"capitalize", background: tab===tb ? "#6366f1" : "transparent", color: tab===tb ? "#fff" : t.textSub, border:"none", borderRadius:6, cursor:"pointer" }}>{tb}</button>
                  ))}
                </div>

                {tab === "build" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:5, overflowY:"auto", maxHeight:"35vh" }}>
                    {Object.values(BUILDINGS).map(b => {
                      const active = selected === b.id;
                      const locked = b.unlockAt > currentLevel;
                      return (
                        <button key={b.id} className="bld-btn" onClick={() => setSelected(b.id)} disabled={locked} style={{
                          padding:8, borderRadius:10, border: active ? `2px solid ${b.color}` : "1px solid rgba(0,0,0,0.05)",
                          background: active ? `${b.color}15` : t.chartCard, color: t.text, opacity: locked ? 0.4 : 1, textAlign:"left"
                        }}>
                          <span>{b.icon} {b.label}</span>
                          <span style={{ fontSize:9, float:"right", color: locked ? "#ef4444" : "#10b981", fontFamily:"'DM Mono'" }}>{locked ? `🔒 Lvl ${b.unlockAt}` : `💰 ${b.cost}`}</span>
                        </button>
                      );
                    })}
                  </div>
                )}

                {tab === "missions" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:5 }}>
                    {MISSIONS.map(m => {
                      const isDone = completedM.includes(m.id);
                      return (
                        <div key={m.id} style={{ padding:8, borderRadius:10, background: isDone ? "rgba(16,185,129,0.1)" : t.chartCard, border: `1px solid ${isDone ? "#10b981":"rgba(0,0,0,0.05)"}` }}>
                          <div style={{ fontSize:11, fontWeight:700, color: isDone ? "#10b981" : t.text }}>{m.icon} {m.title} {isDone ? "✓" : ""}</div>
                          <div style={{ fontSize:9, color:t.textMuted }}>{m.desc} (+💰{m.reward})</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {tab === "analytics" && (
                  <div style={{ marginTop:5, display:"flex", flexDirection:"column", gap:10 }}>
                    {window.Recharts ? (
                      <div style={{ background: t.chartCard, padding:8, borderRadius:10 }}>
                        <span style={{ fontSize:10, fontWeight:700 }}>Metrics Chart</span>
                        <div style={{ width: '100%', height: 110, marginTop: 5 }}>
                          <ResponsiveContainer>
                            <BarChart data={barData} margin={{ top: 5, right: 5, left: -35, bottom: 0 }}>
                              <XAxis dataKey="name" stroke={t.textSub} style={{ fontSize: 7 }} />
                              <YAxis stroke={t.textSub} style={{ fontSize: 7 }} />
                              <Bar dataKey="value" fill="#6366f1" radius={[2, 2, 0, 0]} />
                            </BarChart>
                          </ResponsiveContainer>
                        </div>
                      </div>
                    ) : (
                      <div style={{ fontSize:10, color:t.textMuted, padding:10 }}>Chart CDN Loading...</div>
                    )}
                    <div>
                      <StatBar label="Sustainability" val={stats.sustainability} color="#10b981" icon="🌱" t={t} />
                      <StatBar label="Pollution Index" val={stats.pollution} color="#f97316" icon="💨" t={t} />
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT VIEWPORT GRAPHICS (THE 3D GRID WORLD) */}
              <div className="main-content">
                <div className="top-bar" style={{ background: t.glass, borderColor: t.sidebarBdr }}>
                  <div style={{ fontSize:12, fontWeight:600 }}>🌟 Environment Performance Matrix</div>
                  <button onClick={() => setThemeMode(themeMode === "dark" ? "light" : "dark")} style={{
                      background: "transparent", border: "1px solid rgba(255,255,255,0.2)", color: t.text,
                      padding: "4px 10px", borderRadius: 6, fontSize: 11, cursor: "pointer"
                  }}>
                      {themeMode === "dark" ? "🌙 Night" : "☀️ Day"}
                  </button>
                </div>

                <div className="world-container">
                  <div className="grid-isometric" style={{ filter: t.gridFilter }}>
                    {grid.map((cell, idx) => (
                      <IsoCell 
                        key={idx} 
                        building={cell} 
                        selected={selected} 
                        isNight={themeMode === "dark"} 
                        t={t} 
                        sizePx={44}
                        onClick={() => buildCell(idx)}
                        onRightClick={() => removeCell(idx)}
                      />
                    ))}
                  </div>
                </div>
              </div>

            </div>
          );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CityApp />);
    </script>
</body>
</html>
