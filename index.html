<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityOS Core — Reward & Progression Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --acc: #10b981; --bg: #030712; --card: rgba(15, 23, 42, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .world { perspective: 2000px; height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e293b 0%, #030712 100%); }
        .grid { display: grid; grid-template-columns: repeat(8, 75px); grid-template-rows: repeat(8, 75px); gap: 6px; transform: rotateX(58deg) rotateZ(-45deg); transform-style: preserve-3d; transition: transform 0.5s ease; }

        .tile { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); position: relative; transition: 0.2s; cursor: pointer; }
        .tile:hover { background: rgba(99, 102, 241, 0.15); transform: translateZ(8px); border-color: var(--p); }

        .bld-wrapper { position: absolute; transform: rotateZ(45deg) rotateX(-58deg) translateY(-32px); animation: buildPop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .bld-icon { font-size: 50px; filter: drop-shadow(0 20px 10px rgba(0,0,0,0.6)); }
        @keyframes buildPop { from { transform: rotateZ(45deg) rotateX(-58deg) scale(0); opacity: 0; } }

        /* Professional HUD Layout */
        .hud { position: fixed; top: 25px; left: 25px; background: var(--card); padding: 20px 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); min-width: 260px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 50; }
        .xp-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--p), #a855f7); transition: 0.4s ease; }

        /* Level Up Reward Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.3s ease; }
        .modal-card { background: #0f172a; border: 2px solid var(--p); padding: 40px; border-radius: 32px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 0 50px rgba(99, 102, 241, 0.3); animation: scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .reward-badge { font-size: 60px; margin-bottom: 15px; display: inline-block; animation: bounce 1s infinite alternate; }
        .continue-btn { margin-top: 25px; background: var(--p); color: white; border: none; padding: 12px 35px; font-weight: 700; border-radius: 16px; cursor: pointer; transition: 0.2s; width: 100%; }
        .continue-btn:hover { background: #4f46e5; transform: scale(1.02); }

        /* Bottom Menu Toolbar */
        .footer { position: fixed; bottom: 30px; display: flex; gap: 12px; background: var(--card); padding: 12px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); z-index: 50; backdrop-filter: blur(20px); }
        .tool-btn { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 18px; border: 1px solid transparent; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; min-width: 85px; color: white; }
        .tool-btn.active { background: var(--p); transform: translateY(-10px); box-shadow: 0 12px 24px rgba(99,102,241,0.4); }
        .tool-btn.locked { opacity: 0.15; filter: grayscale(1); cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; } }
        @keyframes scaleUp { from { transform: scale(0.9) translateY(20px); opacity: 0; } }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const CityGame = () => {
            const [money, setMoney] = useState(35000);
            const [xp, setXp] = useState(0);
            const [lvl, setLvl] = useState(1);
            const [grid, setGrid] = useState(Array(64).fill(null));
            const [activeTool, setActiveTool] = useState('RES');
            const [showModal, setShowModal] = useState(false);
            const [unlockedItem, setUnlockedItem] = useState('');

            const levelTitles = {
                1: 'Data Novice',
                2: 'Model Architect',
                3: 'Deep Learning Guru',
                4: 'Predictive Strategist',
                5: 'Elite AI Researcher'
            };

            const nextLevelGoal = lvl * 1200;

            const items = {
                RES: { name: 'Housing', cost: 1200, icon: '🏡', xp: 200, req: 1 },
                LAB: { name: 'AI Lab', cost: 5500, icon: '🏭', xp: 450, req: 1 },
                PARK: { name: 'Server Park', cost: 2500, icon: '🌳', xp: 300, req: 2 },
                EIFFEL: { name: 'Eiffel Core', cost: 18000, icon: '🗼', xp: 2000, req: 3 }
            };

            const buildItem = (idx) => {
                const current = items[activeTool];
                if (grid[idx] || money < current.cost || lvl < current.req) return;
                
                const newGrid = [...grid];
                newGrid[idx] = current;
                setGrid(newGrid);
                setMoney(m => m - current.cost);
                setXp(x => x + current.xp);
            };

            // Dynamic tracking for rewards and unlocks
            useEffect(() => {
                if (xp >= nextLevelGoal) {
                    const nextLvl = lvl + 1;
                    setXp(prev => prev - nextLevelGoal);
                    setLvl(nextLvl);
                    setMoney(m => m + (nextLvl * 5000)); // Level Up Cash Bonus!
                    
                    // Check if an item got unlocked
                    const newlyUnlocked = Object.values(items).find(item => item.req === nextLvl);
                    setUnlockedItem(newlyUnlocked ? newlyUnlocked.name : 'Premium Server Tokens');
                    setShowModal(true);
                }
            }, [xp]);

            return (
                <div className="world">
                    {/* Level Up Reward Card */}
                    {showModal && (
                        <div className="modal-overlay">
                            <div className="modal-card">
                                <span className="reward-badge">🎉</span>
                                <h2 style={{fontSize:'28px', fontWeight:'800', color:'var(--p)'}}>LEVEL UP!</h2>
                                <p style={{fontSize:'14px', opacity:0.6, marginTop:'5px'}}>Advanced Track Progression</p>
                                
                                <div style={{background:'rgba(255,255,255,0.02)', padding:'20px', borderRadius:'20px', margin:'20px 0', border:'1px solid rgba(255,255,255,0.05)'}}>
                                    <div style={{fontWeight:'700', fontSize:'18px'}}>{levelTitles[lvl] || 'Senior Data Specialist'}</div>
                                    <div style={{color:'var(--acc)', fontSize:'13px', marginTop:'8px', fontWeight:'600'}}>🎁 Reward: +₿ {(lvl * 5000).toLocaleString()}</div>
                                    <div style={{fontSize:'12px', opacity:0.7, marginTop: '4px'}}>🔓 Unlocked: {unlockedItem}</div>
                                </div>

                                <button className="continue-btn" onClick={() => setShowModal(false)}>Collect & Continue</button>
                            </div>
                        </div>
                    )}

                    {/* HUD */}
                    <div className="hud">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <span style={{fontSize: '11px', fontWeight: '800', color: '#6366f1', letterSpacing:'1px'}}>{levelTitles[lvl]?.toUpperCase() || 'AI AGENT'}</span>
                            <span style={{fontSize: '11px', padding:'3px 8px', background:'rgba(16,185,129,0.1)', color:'var(--acc)', borderRadius:'6px', fontWeight:'700'}}>LVL {lvl}</span>
                        </div>
                        <div style={{fontSize: '30px', fontWeight: '800', margin:'8px 0'}}>₿ {money.toLocaleString()}</div>
                        <div className="xp-bar-bg">
                            <div className="xp-bar-fill" style={{width: `${(xp/nextLevelGoal)*100}%`}}></div>
                        </div>
                        <div style={{display:'flex', justifyContent:'space-between', fontSize: '10px', opacity: 0.5}}>
                            <span>XP: {xp}/{nextLevelGoal}</span>
                            <span>Next: Level {lvl + 1}</span>
                        </div>
                    </div>

                    {/* 3D Visual Grid Area */}
                    <div className="grid">
                        {grid.map((cell, i) => (
                            <div key={i} className="tile" onClick={() => buildItem(i)}>
                                {cell && <div className="bld-wrapper"><span className="bld-icon">{cell.icon}</span></div>}
                            </div>
                        ))}
                    </div>

                    {/* Footer Tools */}
                    <div className="footer">
                        {Object.entries(items).map(([id, data]) => (
                            <div key={id} 
                                className={`tool-btn ${activeTool === id ? 'active' : ''} ${lvl < data.req ? 'locked' : ''}`}
                                onClick={() => lvl >= data.req && setActiveTool(id)}>
                                <span style={{fontSize: '26px'}}>{lvl < data.req ? '🔒' : data.icon}</span>
                                <span style={{fontSize: '10px', marginTop: '6px', fontWeight: '800'}}>{data.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CityGame />);
    </script>
</body>
</html>
