<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityOS Matrix v5: Neural Urban Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
        }
        body, html, #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030712;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 99px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .voxel-animate {
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // Inject global environment variable required by Recharts in CDN environments
        window.process = { env: { NODE_ENV: 'production' } };

        const { useState, useEffect, useCallback, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

        // ═══════════════════════════════════════════════════════════════
        // CONFIGURATIONS, THEMES & SEED DATA STRUCTS
        // ═══════════════════════════════════════════════════════════════
        const GRID_COLS = 10;
        const GRID_SIZE = GRID_COLS * GRID_COLS;
        const STARTING_COINS = 800;

        const BUILDINGS = {
            TREE:     { id:"TREE",     label:"Oak Tree",      icon:"🌳", cost:20,  beauty:10, oxygen:15, pollution:-10, traffic:0,  energy:2,  population:0,  runoffImpact: -20, bearingReq: 1, color:"#10b981", unlockAt: 1 },
            ROAD:     { id:"ROAD",     label:"Smart Road",    icon:"🛣️", cost:30,  beauty:2,  oxygen:-4, pollution:5,   traffic:-20,energy:-2, population:0,  runoffImpact: 30,  bearingReq: 2, color:"#64748b", unlockAt: 1 },
            HOUSE:    { id:"HOUSE",    label:"Modern Villa",  icon:"🏠", cost:100, beauty:15, oxygen:-2, pollution:4,   traffic:8,  energy:-6, population:12, runoffImpact: 15,  bearingReq: 3, color:"#3b82f6", unlockAt: 1 },
            PARK:     { id:"PARK",     label:"Ecotopia Park", icon:"🌿", cost:60,  beauty:25, oxygen:20, pollution:-15, traffic:-5, energy:4,  population:4,  runoffImpact: -30, bearingReq: 1, color:"#22c55e", unlockAt: 2 },
            MART:     { id:"MART",     label:"Cyber Mart",    icon:"🏪", cost:160, beauty:8,  oxygen:-5, pollution:12,  traffic:15, energy:-12,population:25, runoffImpact: 20,  bearingReq: 4, color:"#a855f7", unlockAt: 3 },
            SOLAR:    { id:"SOLAR",    label:"Solar Array",   icon:"☀️", cost:200, beauty:5,  oxygen:6,  pollution:-20, traffic:0,  energy:45, population:2,  runoffImpact: 8,   bearingReq: 2, color:"#eab308", unlockAt: 4 },
            FACTORY:  { id:"FACTORY",  label:"Algae Factory", icon:"🏭", cost:250, beauty:-12,oxygen:-20,pollution:30,  traffic:18, energy:25, population:15, runoffImpact: 35,  bearingReq: 5, color:"#f97316", unlockAt: 5 },
            TOWER:    { id:"TOWER",    label:"Matrix Tower",  icon:"🏙️", cost:450, beauty:35, oxygen:-10,pollution:15,  traffic:25, energy:-35,population:80, runoffImpact: 25,  bearingReq: 5, color:"#06b6d4", unlockAt: 6 },
            FASHION:  { id:"FASHION",  label:"AI Couture Hub",icon:"👗", cost:300, beauty:40, oxygen:5,  pollution:-2,  traffic:10, energy:-10,population:30, runoffImpact: 12,  bearingReq: 3, color:"#ec4899", unlockAt: 4 }
        };

        const THEMES = {
            light: {
                bg: "linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%)",
                sidebar: "rgba(255, 255, 255, 0.95)",
                sidebarBdr: "rgba(99, 102, 241, 0.15)",
                panelBg: "#ffffff",
                cellTop: "#f1f5f9", cellLeft: "#cbd5e1", cellRight: "#94a3b8",
                text: "#0f172a", textSub: "#475569", textMuted: "#94a3b8",
                glassBdr: "rgba(99, 102, 241, 0.2)", gridBg: "rgba(255, 255, 255, 0.7)"
            },
            dark: {
                bg: "linear-gradient(135deg, #05070f 0%, #0b1326 50%, #02040a 100%)",
                sidebar: "rgba(9, 15, 30, 0.96)",
                sidebarBdr: "rgba(99, 102, 241, 0.3)",
                panelBg: "#0f172a",
                cellTop: "#1e293b", cellLeft: "#0f172a", cellRight: "#020617",
                text: "#f8fafc", textSub: "#94a3b8", textMuted: "#475569",
                glassBdr: "rgba(99, 102, 241, 0.3)", gridBg: "rgba(13, 22, 43, 0.5)"
            }
        };

        const SOIL_MATRIX_PROFILE = Array.from({ length: GRID_SIZE }, (_, i) => {
            const x = Math.floor(i / GRID_COLS);
            const y = i % GRID_COLS;
            const dynamicWeight = Math.sin(x * 0.8) + Math.cos(y * 0.8);
            return Math.floor(((dynamicWeight + 2) / 4) * 5) + 1;
        });

        // ═══════════════════════════════════════════════════════════════
        // METRICS CALCULATOR ENGINE & MATHEMATICAL OPTIMIZER AGENT
        // ═══════════════════════════════════════════════════════════════
        function computeSimulationMetrics(grid) {
            let oxygen = 40, beauty = 30, pollution = 20, traffic = 30, energy = 50, population = 0, score = 0;
            let combinedStormwaterRunoffIndex = 15;

            grid.forEach((nodeId) => {
                if (!nodeId || !BUILDINGS[nodeId]) return;
                const b = BUILDINGS[nodeId];
                oxygen = Math.max(0, Math.min(100, oxygen + b.oxygen));
                beauty = Math.max(0, Math.min(100, beauty + b.beauty));
                pollution = Math.max(0, Math.min(100, pollution + b.pollution));
                traffic = Math.max(0, Math.min(100, traffic + b.traffic));
                energy = Math.max(0, Math.min(100, energy + b.energy));
                population += b.population;
                combinedStormwaterRunoffIndex += b.runoffImpact;
                score += 20 + b.beauty;
            });

            const livability = Math.round((oxygen + beauty + (100 - pollution) + (100 - traffic) + energy) / 5);
            const sustainability = Math.round(oxygen * 0.4 + (100 - pollution) * 0.4 + energy * 0.2);
            const runoffRisk = Math.max(5, Math.min(100, combinedStormwaterRunoffIndex));

            return { oxygen, beauty, pollution, traffic, energy, population, score, livability, sustainability, runoffRisk };
        }

        function runParametricAIOptimizer(grid, budget) {
            let highestUtilityScore = -Infinity;
            let proposal = { cellIndex: -1, buildingId: null, message: "Engine optimizing systemic matrices..." };

            for (let i = 0; i < GRID_SIZE; i++) {
                if (grid[i]) continue;
                const soilRating = SOIL_MATRIX_PROFILE[i];

                for (const bId of Object.keys(BUILDINGS)) {
                    const b = BUILDINGS[bId];
                    if (budget < b.cost || soilRating < b.bearingReq) continue;

                    let virtualGrid = [...grid];
                    virtualGrid[i] = bId;
                    const simulatedMetrics = computeSimulationMetrics(virtualGrid);

                    const utilityMetric = (simulatedMetrics.livability * 2.5) + (simulatedMetrics.sustainability * 1.8) - (simulatedMetrics.runoffRisk * 1.2);

                    if (utilityMetric > highestUtilityScore) {
                        highestUtilityScore = utilityMetric;
                        proposal.cellIndex = i;
                        proposal.buildingId = bId;
                        proposal.message = `Deploy structural node [${b.icon} ${b.label}] on target Coordinate Cell ${i}. This action yields optimal parametric distribution, balancing geotechnical load margins while maximizing eco scores.`;
                    }
                }
            }
            if (proposal.cellIndex === -1) {
                proposal.message = "System allocation threshold saturated or capital reserves locked. Increase budget pipelines to trigger AI agent recommendation vectors.";
            }
            return proposal;
        }

        // ═══════════════════════════════════════════════════════════════
        // MAIN FRONTEND INTERFACE VIEW COMPONENT ASSEMBLY
        // ═══════════════════════════════════════════════════════════════
        function MainApplicationAssembly() {
            const [grid, setGrid] = useState(Array(GRID_SIZE).fill(null));
            const [selectedModule, setSelectedModule] = useState("TREE");
            const [coins, setCoins] = useState(STARTING_COINS);
            const [moves, setMoves] = useState(0);
            const [level, setLevel] = useState(1);
            const [isNight, setIsNight] = useState(true);
            const [currentTab, setCurrentTab] = useState("build");
            const [tutorialStep, setTutorialStep] = useState(0); 
            const [historyLogs, setHistoryLogs] = useState([]);
            const [aiAdviceOutput, setAiAdviceOutput] = useState(null);
            const [timeSeriesMetrics, setTimeSeriesMetrics] = useState([]);

            const currentTheme = isNight ? THEMES.dark : THEMES.light;
            const calculatedStats = useMemo(() => computeSimulationMetrics(grid), [grid]);

            useEffect(() => {
                setTimeSeriesMetrics(prev => {
                    if (prev.length > 0 && prev[prev.length - 1].moveIndex === moves) return prev;
                    const predictivePollutionTrend = Math.min(100, calculatedStats.pollution + (calculatedStats.population * 0.12));
                    return [...prev, {
                        name: `M-${moves}`,
                        moveIndex: moves,
                        Livability: calculatedStats.livability,
                        StormwaterRisk: calculatedStats.runoffRisk,
                        ProjectedPollution: Math.round(predictivePollutionTrend)
                    }].slice(-10);
                });
            }, [moves, calculatedStats]);

            useEffect(() => {
                if (tutorialStep < 3) return;
                let aggregateNetWorth = coins + (grid.filter(c => c !== null).length * 60);
                let targetedTier = 1;

                if (aggregateNetWorth >= 14000) targetedTier = 12;
                else if (aggregateNetWorth >= 11500) targetedTier = 11;
                else if (aggregateNetWorth >= 9000)  targetedTier = 10;
                else if (aggregateNetWorth >= 7200)  targetedTier = 9;
                else if (aggregateNetWorth >= 5500)  targetedTier = 8;
                else if (aggregateNetWorth >= 4000)  targetedTier = 7;
                else if (aggregateNetWorth >= 2600)  targetedTier = 6;
                else if (aggregateNetWorth >= 1600)  targetedTier = 5;
                else if (aggregateNetWorth >= 900)   targetedTier = 4;
                else if (aggregateNetWorth >= 450)   targetedTier = 3;
                else if (aggregateNetWorth >= 150)   targetedTier = 2;

                if (targetedTier > level && level < 12) {
                    setLevel(targetedTier);
                    setCoins(prev => prev + 500); 
                }
            }, [grid, coins, tutorialStep, level]);

            useEffect(() => {
                if (tutorialStep < 3) return;
                const periodicYieldInterval = setInterval(() => {
                    let cumulativeYieldInjectedValue = 0;
                    grid.forEach(cellId => {
                        if (cellId && BUILDINGS[cellId]) {
                            if (cellId === "HOUSE") cumulativeYieldInjectedValue += 8;
                            if (cellId === "MART") cumulativeYieldInjectedValue += 16;
                            if (cellId === "FACTORY") cumulativeYieldInjectedValue += 28;
                            if (cellId === "TOWER") cumulativeYieldInjectedValue += 40;
                        }
                    });
                    if (cumulativeYieldInjectedValue > 0) {
                        setCoins(prev => prev + cumulativeYieldInjectedValue);
                    }
                }, 3000);
                return () => clearInterval(periodicYieldInterval);
            }, [grid, tutorialStep]);

            const triggerAIParametricInferenceAgent = () => {
                const analyticsAdviceInstance = runParametricAIOptimizer(grid, coins);
                setAiAdviceOutput(analyticsAdviceInstance);
            };

            const deployStructuralMatrixNode = (idx) => {
                if (grid[idx] !== null) return;
                const targetModule = BUILDINGS[selectedModule];

                if (tutorialStep === 1) return;
                if (tutorialStep === 2 && selectedModule !== "TREE") return;

                if (coins < targetModule.cost) return;
                if (SOIL_MATRIX_PROFILE[idx] < targetModule.bearingReq) {
                    alert(`Geotechnical Deficit Error: Selected sector coordinate structural profile bearing threshold is [${SOIL_MATRIX_PROFILE[idx]}]. Structural footprint of ${targetModule.label} requires an allocation parameter value ≥ ${targetModule.bearingReq}.`);
                    return;
                }

                setHistoryLogs(prev => [...prev, [...grid]]);
                setGrid(prev => {
                    const clonedGridArray = [...prev];
                    clonedGridArray[idx] = selectedModule;
                    return clonedGridArray;
                });
                setCoins(prev => prev - targetModule.cost);
                setMoves(prev => prev + 1);
                setAiAdviceOutput(null);

                if (tutorialStep === 2 && selectedModule === "TREE") {
                    setTutorialStep(3); 
                }
            };

            const wipeStructuralMatrixNode = (idx, event) => {
                if (event) event.preventDefault();
                if (tutorialStep < 3 || !grid[idx]) return;

                setHistoryLogs(prev => [...prev, [...grid]]);
                setGrid(prev => {
                    const clonedGridArray = [...prev];
                    clonedGridArray[idx] = null;
                    return clonedGridArray;
                });
                setMoves(prev => prev + 1);
                setAiAdviceOutput(null);
            };

            const systemWipeFormatPurgeProcedure = () => {
                if (window.confirm("Authorize full system sector formatting vectors? This structural state modification sequence wipes operational logs permanently.")) {
                    setGrid(Array(GRID_SIZE).fill(null));
                    setCoins(STARTING_COINS);
                    setMoves(0);
                    setLevel(1);
                    setHistoryLogs([]);
                    setTimeSeriesMetrics([]);
                    setAiAdviceOutput(null);
                    setTutorialStep(3); 
                }
            };

            const revertHistoricalStateLog = () => {
                if (!historyLogs.length) return;
                const previousGridSnapshotFrame = historyLogs[historyLogs.length - 1];
                setGrid(previousGridSnapshotFrame);
                setHistoryLogs(old => old.slice(0, -1));
                setMoves(prev => Math.max(0, prev - 1));
                setAiAdviceOutput(null);
            };

            return (
                <div style={{
                    width: "100vw", height: "100%", background: currentTheme.bg, color: currentTheme.text,
                    display: "flex", flexDirection: "row", position: "relative", transition: "all 0.4s ease"
                }}>
                    
                    {/* CINEMATIC ONBOARDING ACCELERATOR PANEL SPLASH LAYER */}
                    {tutorialStep === 0 && (
                        <div style={{
                            position: "fixed", inset: 0, background: "linear-gradient(135deg, #040612 0%, #0b152d 100%)",
                            zIndex: 20000, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px"
                        }}>
                            <div style={{
                                background: "rgba(13, 24, 48, 0.85)", border: "2px solid #6366f1", padding: "40px",
                                borderRadius: "24px", maxWidth: "550px", width: "100%",
                                boxShadow: "0 0 60px rgba(99, 102, 241, 0.4)", backdropFilter: "blur(20px)", textAlign: 'center'
                            }}>
                                <h1 style={{ fontSize: "32px", fontWeight: 800, letterSpacing: "-1px", color: "#fff", marginBottom: "8px" }}>
                                    Welcome to CityOS Matrix
                                </h1>
                                <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "10px", color: "#818cf8", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "20px" }}>
                                    Neural Infrastructure Analytics System
                                </p>
                                <p style={{ color: "#94a3b8", fontSize: "14px", lineHeight: "1.6", marginBottom: "32px" }}>
                                    An adaptive sandbox environment where data intelligence algorithms, hydraulic flood routing parameters, and advanced geotechnical civil engineering matrices converge seamlessly.
                                </p>
                                <button 
                                    onClick={() => setTutorialStep(1)}
                                    style={{
                                        background: "linear-gradient(90deg, #6366f1, #4f46e5)", color: "white", border: "none",
                                        padding: "14px 38px", fontSize: "15px", fontWeight: 700, borderRadius: "12px",
                                        cursor: "pointer", boxShadow: "0 4px 20px rgba(99,102,241,0.45)", transition: "transform 0.2s"
                                    }}
                                >
                                    Initialize Training Mode
                                </button>
                            </div>
                        </div>
                    )}

                    {/* CONTROL HOOD DASHBOARD SIDEBAR PANEL */}
                    <div style={{
                        width: "350px", height: "100%", background: currentTheme.sidebar,
                        borderRight: `1px solid ${currentTheme.sidebarBdr}`, padding: "24px", display: "flex",
                        flexDirection: "column", gap: "20px", zIndex: 1000, backdropFilter: "blur(20px)"
                    }}>
                        
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <h2 style={{ fontSize: "22px", fontWeight: 800, letterSpacing: "-1px" }}>⚙️ CityOS Matrix</h2>
                            <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "9px", color: "#6366f1", marginTop: "2px", letterSpacing: "1px" }}>
                                AUTOMATED GENERATIVE CONTEXT
                            </p>
                          </div>
                          <button 
                            onClick={() => setIsNight(!isNight)}
                            style={{
                                width: "48px", height: "26px", borderRadius: "99px", border: "none",
                                background: isNight ? "#1e293b" : "#e2e8f0", cursor: "pointer",
                                display: "flex", alignItems: "center", justifyContent: isNight ? "flex-end" : "flex-start", padding: "4px"
                            }}
                          >
                            <span>{isNight ? "🌙" : "☀️"}</span>
                          </button>
                        </div>

                        <div style={{
                            background: tutorialStep === 1 ? "rgba(99, 102, 241, 0.25)" : "linear-gradient(135deg, #4f46e5 0%, #312e81 100%)",
                            padding: "18px", borderRadius: "16px", color: "#fff",
                            boxShadow: "0 10px 25px rgba(99, 102, 241, 0.2)",
                            border: tutorialStep === 1 ? "3px solid #6366f1" : "none",
                            transform: tutorialStep === 1 ? "scale(1.02)" : "scale(1)", transition: "all 0.3s ease"
                        }}>
                            <span style={{ fontSize: "10px", fontFamily: "'JetBrains Mono', monospace", opacity: 0.85, letterSpacing: "1px" }}>
                                CORE MUNICIPAL VALUATION RESERVES
                            </span>
                            <div style={{ fontSize: "32px", fontWeight: 800, margin: "6px 0", color: "#fbbf24" }}>
                                💰 {coins}
                            </div>
                            <div style={{ display: "flex", justifyContent: "space-between", borderTop: "1px solid rgba(255,255,255,0.15)", paddingTop: "10px", fontSize: "11px", fontFamily: "'JetBrains Mono', monospace" }}>
                                <span>STAGE: <b style={{color: '#93c5fd'}}>{level}/12</b></span>
                                <span>MOVES: <b>{moves}</b></span>
                                <span>POP: <b>{calculatedStats.population}</b></span>
                            </div>
                        </div>

                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                            <button 
                                onClick={revertHistoricalStateLog} 
                                disabled={!historyLogs.length || tutorialStep < 3}
                                style={{ padding: "10px", fontSize: "12px", fontWeight: 600, cursor: "pointer", borderRadius: "8px", border: `1px solid ${currentTheme.sidebarBdr}`, background: "transparent", color: currentTheme.text }}
                            >
                                ↩️ Step Undo
                            </button>
                            <button 
                                onClick={systemWipeFormatPurgeProcedure}
                                style={{ padding: "10px", fontSize: "12px", fontWeight: 600, cursor: "pointer", borderRadius: "8px", border: "none", background: "#ef4444", color: "#fff" }}
                            >
                                🔄 Format Mesh
                            </button>
                        </div>

                        <div style={{ display: "flex", background: isNight ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)", padding: "4px", borderRadius: "10px" }}>
                            {["build", "analytics", "ai-agent"].map(tabKey => (
                                <button
                                    key={tabKey}
                                    onClick={() => tutorialStep >= 3 && setCurrentTab(tabKey)}
                                    disabled={tutorialStep < 3 && tabKey !== "build"}
                                    style={{
                                        flex: 1, padding: "8px 0", border: "none", background: currentTab === tabKey ? "#6366f1" : "transparent",
                                        color: currentTab === tabKey ? "#fff" : currentTheme.textSub, borderRadius: "6px", fontSize: "12px",
                                        fontWeight: 700, textTransform: "uppercase", cursor: tutorialStep < 3 ? "not-allowed" : "pointer", opacity: (tutorialStep < 3 && tabKey !== "build") ? 0.3 : 1
                                    }}
                                >
                                    {tabKey.replace("-", " ")}
                                </button>
                            ))}
                        </div>

                        <div style={{ flex: 1, overflowY: "auto" }}>
                            
                            {currentTab === "build" && (
                                <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                                    <h3 style={{ fontSize: "11px", fontFamily: "'JetBrains Mono', monospace", color: currentTheme.textMuted, letterSpacing: "1.5px" }}>
                                        INFRASTRUCTURE CATALOG REGISTRY
                                    </h3>
                                    <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                                        {Object.values(BUILDINGS).map(item => {
                                            const isActiveSelection = selectedModule === item.id;
                                            const isLockedByStageValue = level < item.unlockAt;
                                            
                                            let tutorialHighlightStyle = {};
                                            let isInteractiveBlockedByTutorial = false;

                                            if (tutorialStep === 2) {
                                                if (item.id === "TREE") {
                                                    tutorialHighlightStyle = { border: "2px solid #34d399", background: "rgba(52, 211, 153, 0.12)" };
                                                } else {
                                                    isInteractiveBlockedByTutorial = true;
                                                }
                                            } else if (tutorialStep === 1) {
                                                isInteractiveBlockedByTutorial = true;
                                            }

                                            return (
                                                <button
                                                    key={item.id}
                                                    disabled={isLockedByStageValue || isInteractiveBlockedByTutorial}
                                                    onClick={() => setSelectedModule(item.id)}
                                                    style={{
                                                        display: "flex", alignItems: "center", gap: "12px", padding: "12px",
                                                        borderRadius: "12px", border: isActiveSelection ? "2px solid #6366f1" : `1px solid ${currentTheme.sidebarBdr}`,
                                                        background: isActiveSelection ? "rgba(99, 102, 241, 0.15)" : currentTheme.panelBg,
                                                        color: currentTheme.text, textAlign: "left", cursor: "pointer", opacity: (isLockedByStageValue || isInteractiveBlockedByTutorial) ? 0.4 : 1,
                                                        ...tutorialHighlightStyle, transition: "all 0.2s ease"
                                                    }}
                                                >
                                                    <span style={{ fontSize: "22px" }}>{item.icon}</span>
                                                    <div style={{ flex: 1 }}>
                                                        <div style={{ fontSize: "13px", fontWeight: 700 }}>{item.label}</div>
                                                        <div style={{ fontSize: "10px", color: currentTheme.textMuted, fontFamily: "'JetBrains Mono', monospace", marginTop: "2px" }}>
                                                            Cost: 💰{item.cost} | Geotechnical Load: ≥{item.bearingReq}
                                                        </div>
                                                    </div>
                                                    {isLockedByStageValue && (
                                                        <span style={{ fontSize: "10px", background: "rgba(239,68,68,0.15)", color: "#f87171", padding: "2px 6px", borderRadius: "4px" }}>
                                                            🔒 Lvl {item.unlockAt}
                                                        </span>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {currentTab === "analytics" && (
                                <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                                        <div style={{ padding: "12px", background: currentTheme.panelBg, borderRadius: "10px", border: `1px solid ${currentTheme.sidebarBdr}` }}>
                                            <div style={{ fontSize: "10px", color: currentTheme.textMuted }}>OXYGEN IND.</div>
                                            <div style={{ fontSize: "18px", fontWeight: 800, color: "#10b981", marginTop: "4px" }}>{calculatedStats.oxygen}%</div>
                                        </div>
                                        <div style={{ padding: "12px", background: currentTheme.panelBg, borderRadius: "10px", border: `1px solid ${currentTheme.sidebarBdr}` }}>
                                            <div style={{ fontSize: "10px", color: currentTheme.textMuted }}>TRAFFIC NET</div>
                                            <div style={{ fontSize: "18px", fontWeight: 800, color: "#f59e0b", marginTop: "4px" }}>{calculatedStats.traffic}%</div>
                                        </div>
                                    </div>

                                    <div style={{ padding: "14px", background: currentTheme.panelBg, borderRadius: "12px", border: `1px solid ${currentTheme.sidebarBdr}` }}>
                                        <div style={{ fontSize: "11px", color: currentTheme.textMuted, fontWeight: 700 }}>LIVABILITY ECO INDEX HEALTH</div>
                                        <div style={{ fontSize: "26px", fontWeight: 800, color: "#6366f1", marginTop: "4px" }}>{calculatedStats.livability}%</div>
                                    </div>

                                    <div style={{ padding: "14px", background: currentTheme.panelBg, borderRadius: "12px", border: `1px solid ${currentTheme.sidebarBdr}` }}>
                                        <div style={{ fontSize: "11px", color: currentTheme.textMuted, fontWeight: 700 }}>STORMWATER RUNOFF RISK (HYDRAULICS)</div>
                                        <div style={{ fontSize: "26px", fontWeight: 800, color: calculatedStats.runoffRisk > 45 ? "#ef4444" : "#3b82f6", marginTop: "4px" }}>{calculatedStats.runoffRisk}%</div>
                                    </div>

                                    <div style={{ height: "180px", width: "100%", background: currentTheme.panelBg, padding: "10px", borderRadius: "12px", border: `1px solid ${currentTheme.sidebarBdr}` }}>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={timeSeriesMetrics}>
                                                <XAxis dataKey="name" stroke={currentTheme.textMuted} fontSize={9} />
                                                <Tooltip contentStyle={{ background: '#0f172a', color: '#fff', fontSize: '11px' }} />
                                                <Line type="monotone" dataKey="Livability" stroke="#6366f1" strokeWidth={2} dot={false} />
                                                <Line type="monotone" dataKey="StormwaterRisk" stroke="#3b82f6" strokeWidth={2} dot={false} />
                                                <Line type="dashed" dataKey="ProjectedPollution" stroke="#ef4444" strokeWidth={1} name="Projected Pollution" />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            )}

                            {currentTab === "ai-agent" && (
                                <div style={{ display: "flex", flexDirection: "column", gap: "14px" }}>
                                    <button 
                                        onClick={triggerAIParametricInferenceAgent}
                                        style={{
                                            padding: "14px", background: "linear-gradient(90deg, #6366f1 0%, #a855f7 100%)",
                                            color: "#fff", border: "none", fontWeight: 700, borderRadius: "10px", cursor: "pointer"
                                        }}
                                    >
                                        🤖 Fire AI Optimization Engine
                                    </button>

                                    {aiAdviceOutput && (
                                        <div style={{
                                            padding: "16px", background: "rgba(168, 85, 247, 0.08)",
                                            border: "1px solid #a855f7", borderRadius: "12px"
                                        }}>
                                            <div style={{ fontSize: "10px", fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: "#c084fc", textTransform: "uppercase" }}>
                                                PARAMETRIC MODEL INFERENCE DATA:
                                            </div>
                                            <p style={{ fontSize: "12px", lineHeight: "1.5", margin: "8px 0", color: currentTheme.text }}>
                                                {aiAdviceOutput.message}
                                            </p>
                                            {aiAdviceOutput.cellIndex !== -1 && (
                                                <div style={{ fontSize: "10px", color: currentTheme.textMuted, fontFamily: "'JetBrains Mono', monospace" }}>
                                                    Target Mesh Cell Matrix Coordinate: <b>{aiAdviceOutput.cellIndex}</b>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>

                        <div style={{ background: "rgba(99, 102, 241, 0.06)", border: "1px solid rgba(99, 102, 241, 0.2)", padding: "12px", borderRadius: "12px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "4px" }}>
                                <span style={{ fontSize: "10px", fontWeight: 700, color: "#6366f1" }}>🎯 TARGET OBJECTIVE MATRIX</span>
                                <span style={{ fontSize: "11px", fontWeight: 700, color: "#eab308" }}>
                                    {tutorialStep < 3 ? "0%" : `${Math.min(100, Math.round((calculatedStats.score / 600) * 100))}%`}
                                </span>
                            </div>
                            <p style={{ fontSize: "11px", fontWeight: 500, lineHeight: "1.4" }}>
                                {tutorialStep < 3 ? "Complete the ongoing interactive onboarding training simulation steps." : "Accumulate a cumulative structural architectural score index of 600 points via optimization loops."}
                            </p>
                        </div>

                    </div>

                    {/* VIRTUALIZED GRAPHIC ISOMETRIC GRID CELL MESH FIELD */}
                    <div style={{
                        flex: 1, height: "100%", display: "flex", flexDirection: "column",
                        alignItems: "center", justifyContent: "center", padding: "20px", position: "relative"
                    }}>
                        
                        <div style={{
                            display: "grid", gridTemplateColumns: `repeat(${GRID_COLS}, 54px)`,
                            gap: "5px", background: currentTheme.gridBg, padding: "20px", borderRadius: "20px",
                            border: `1px solid ${currentTheme.glassBdr}`, backdropFilter: "blur(8px)",
                            boxShadow: isNight ? "0 30px 70px rgba(0,0,0,0.6)" : "0 20px 50px rgba(99,102,241,0.05)",
                            opacity: tutorialStep === 1 ? 0.35 : 1, transition: "all 0.4s ease"
                        }}>
                            {grid.map((cellValue, cellIndex) => {
                                const bearingStrengthVal = SOIL_MATRIX_PROFILE[cellIndex];
                                const colorGradationBars = ["#ef4444", "#f97316", "#eab308", "#4ade80", "#10b981"];
                                const activeSoilBarColor = colorGradationBars[bearingStrengthVal - 1];

                                const isMarkedByAiParametricInferenceTarget = aiAdviceOutput && aiAdviceOutput.cellIndex === cellIndex;

                                return (
                                    <div key={cellIndex} style={{ position: "relative", width: "54px", height: "54px" }}>
                                        <IsometricMeshNodeElement 
                                            nodeKey={cellValue}
                                            selectedKey={selectedModule}
                                            theme={currentTheme}
                                            isNight={isNight}
                                            onDeploy={() => deployStructuralMatrixNode(cellIndex)}
                                            onWipe={(e) => wipeStructuralMatrixNode(cellIndex, e)}
                                        />
                                        
                                        <div style={{
                                            position: "absolute", bottom: "1px", left: "20%", width: "60%", height: "3px",
                                            background: activeSoilBarColor, borderRadius: "99px", opacity: cellValue ? 0.2 : 0.85,
                                            boxShadow: `0 1px 4px ${activeSoilBarColor}`, zIndex: 10
                                        }} title={`Soil Load Capacity Profile Level: ${bearingStrengthVal}`} />

                                        {isMarkedByAiParametricInferenceTarget && (
                                            <div style={{
                                                position: "absolute", inset: "-3px", border: "2px dashed #c084fc",
                                                borderRadius: "8px", pointerEvents: "none", zIndex: 12,
                                                boxShadow: "0 0 12px #a855f7"
                                            }} />
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* ASSISTANT COMPASS REAL-TIME ONBOARDING DIALOG PANEL SYSTEM */}
                        <div style={{
                            position: "absolute", bottom: "30px", left: "30px", right: "30px",
                            background: "rgba(10, 17, 36, 0.92)", border: "1px solid #6366f1",
                            borderRadius: "16px", padding: "18px 24px", backdropFilter: "blur(12px)",
                            display: "flex", justifyContent: "space-between", alignItems: "center",
                            boxShadow: "0 15px 40px rgba(0,0,0,0.5)", zIndex: 5000
                        }}>
                            <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
                                <span style={{ fontSize: "24px" }}>🛰️</span>
                                <div style={{ fontSize: "13px", fontWeight: 500, color: "#e2e8f0", lineHeight: "1.5" }}>
                                    {tutorialStep === 1 && (
                                        <span><b>GUIDED ONBOARDING (Step 1 of 2):</b> Survey the core structural metrics layout framework. Constructing items decreases capital reserves. Your starting budget context balance is initialized at <b>💰 800 tokens</b>.</span>
                                    )}
                                    {tutorialStep === 2 && (
                                        <span><b>GUIDED ONBOARDING (Step 2 of 2):</b> Acquire resource infrastructure logic. Select the <b>Oak Tree 🌳</b> component from your inventory block palette panel selection tab, and deploy it onto any target coordinate cell block within the isometric matrix grid field.</span>
                                    )}
                                    {tutorialStep === 3 && (
                                        <span><b>METROPOLIS ARCHITECTURE ENGINE ONLINE:</b> Sandbox structural simulation constraints are fully operational. Left-click to place assets according to geotechnical soil index parameters; Right-click inside cells to remove assets. Run real-time AI agents for optimization heuristics.</span>
                                    )}
                                </div>
                            </div>
                            {tutorialStep === 1 && (
                                <button
                                    onClick={() => setTutorialStep(2)}
                                    style={{
                                        background: "#6366f1", color: "#fff", border: "none", padding: "8px 20px",
                                        fontSize: "12px", fontWeight: 700, borderRadius: "6px", cursor: "pointer"
                                    }}
                                >
                                    Next Phase
                                </button>
                            )}
                        </div>

                    </div>

                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // LOW-LEVEL ISOMETRIC VOXEL RENDER GENERATOR ELEMENT
        // ═══════════════════════════════════════════════════════════════
        function IsometricMeshNodeElement({ nodeKey, selectedKey, theme, isNight, onDeploy, onWipe }) {
            const [isHovered, setIsHovered] = useState(false);
            const activeNodeData = nodeKey ? BUILDINGS[nodeKey] : null;
            const contextHoverData = BUILDINGS[selectedKey];

            return (
                <div
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    onClick={onDeploy}
                    onContextMenu={onWipe}
                    style={{
                        position: "relative", width: "100%", height: "100%", cursor: "pointer",
                        transformStyle: "preserve-3d"
                    }}
                >
                    <div style={{
                        position: "absolute", inset: 0, transform: "rotateX(60deg) rotateZ(-45deg)",
                        transformStyle: "preserve-3d", transition: "all 0.15s ease"
                    }}>
                        <div style={{
                            position: "absolute", inset: 0, borderRadius: "6px",
                            background: isHovered && !nodeKey ? `${contextHoverData.color}25` : nodeKey ? (isNight ? "#1e293b" : "#ffffff") : theme.cellTop,
                            border: `1px solid ${isHovered ? (activeNodeData || contextHoverData).color : "rgba(99,102,241,0.15)"}`,
                            boxShadow: isHovered ? `0 0 12px ${(activeNodeData || contextHoverData).color}40` : "none"
                        }} />
                        <div style={{ position: "absolute", bottom: "-6px", left: 0, right: "50%", height: "6px", background: theme.cellLeft, borderRadius: "2px" }} />
                        <div style={{ position: "absolute", bottom: "-6px", left: "50%", right: 0, height: "6px", background: theme.cellRight, borderRadius: "2px" }} />
                    </div>

                    <div 
                        className="voxel-animate"
                        style={{
                            position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
                            fontSize: "24px", zIndex: 100, transform: isHovered ? "translateY(-8px)" : "translateY(-3px)",
                            transition: "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
                            filter: isNight ? "drop-shadow(0 4px 10px rgba(99,102,241,0.4))" : "drop-shadow(0 6px 8px rgba(0,0,0,0.15))"
                        }}
                    >
                        {nodeKey ? activeNodeData.icon : (isHovered ? contextHoverData.icon : "")}
                    </div>
                </div>
            );
        }

        const rootContainerNodeElement = ReactDOM.createRoot(document.getElementById("root"));
        rootContainerNodeElement.render(<MainApplicationAssembly />);
    </script>
</body>
</html>
