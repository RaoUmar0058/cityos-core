<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityOS Core — Balanced Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --acc: #10b981; --bg: #030712; --card: rgba(15, 23, 42, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        
        .world { height: 100vh; display: flex; align-items: center; justify-content: center; perspective: 2000px; }
        .grid { display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); gap: 8px; transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d; }
        .tile { width: 70px; height: 70px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); position: relative; transition: 0.2s; cursor: pointer; }
        .tile:hover { background: rgba(99, 102, 241, 0.2); transform: translateZ(10px); }

        /* Splash Screen for Level Changes */
        .level-splash { position: fixed; inset: 0; background: rgba(3,7,18,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: splashFade 3s forwards; }
        @keyframes splashFade { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        
        .hud { position: fixed; top: 30px; left: 30px; background: var(--card); padding: 25px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); width: 280px; z-index: 100; }
        .xp-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; margin: 15px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--p), #a855f7); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        .bld-wrapper { position: absolute; transform: rotateZ(45deg) rotateX(-60deg) translateY(-35px); animation: pop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .bld-icon { font-size: 48px; filter: drop-shadow(0 20px 10px rgba(0,0,0,0.5)); }
        @keyframes pop { from { transform: rotateZ(45deg) rotateX(-60deg) scale(0); } }

        .toolbar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: var(--card); padding: 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .tool-btn { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: none; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; min-width: 80px; color: white; }
        .tool-btn.active { background: var(--p); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(99,102,241,0.4); }
        .tool-btn.locked { opacity: 0.2; filter: grayscale(1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const CityGame = () => {
            const [money, setMoney] = useState(20000);
            const [xp, setXp] = useState(0);
            const [lvl, setLvl] = useState(1);
            const [grid, setGrid] = useState(Array(64).fill(null));
            const [activeTool, setActiveTool] = useState('RES');
            const [splash, setSplash] = useState({ show: true, text: 'STARTING JOURNEY: LEVEL 1' });

            // Harder difficulty: Levels take more effort
            const nextLevelGoal = lvl * 5000; 

            const items = {
                RES: { name: 'Housing', cost: 1500, icon: '🏡', xp: 250, req: 1 },
                LAB: { name: 'Lab', cost: 8000, icon: '🏭', xp: 800, req: 1 },
                PARK: { name: 'Garden', cost: 3000, icon: '🌳', xp: 400, req: 2 },
                EIFFEL: { name: 'Eiffel', cost: 50000, icon: '🗼', xp: 5000, req: 3 }
            };

            const build = (idx) => {
                const item = items[activeTool];
                if (grid[idx] || money < item.cost || lvl < item.req) return;
                
                const newGrid = [...grid];
                newGrid[idx] = item;
                setGrid(newGrid);
                setMoney(m => m - item.cost);
                setXp(x => x + item.xp);
            };

            useEffect(() => {
                if (xp >= nextLevelGoal) {
                    const next = lvl + 1;
                    setLvl(next);
                    setXp(0);
                    setMoney(m => m + (next * 10000));
                    setSplash({ show: true, text: `LEVEL UP! UNLOCKED: LEVEL ${next}` });
                    // Reset splash after animation
                    setTimeout(() => setSplash({ show: false, text: '' }), 3000);
                }
            }, [xp]);

            return (
                <div className="world">
                    {splash.show && (
                        <div className="level-splash" key={lvl}>
                            <h1 style={{fontSize: '48px', fontWeight: '800', letterSpacing: '4px'}}>{splash.text}</h1>
                            <p style={{marginTop: '20px', color: '#6366f1'}}>Data Science Architecture Evolving...</p>
                        </div>
                    )}

                    <div className="hud">
                        <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                            <span style={{fontSize: '12px', fontWeight: '800', color: '#6366f1'}}>LEVEL {lvl}</span>
                            <span style={{fontSize: '12px', opacity: 0.5}}>{Math.round((xp/nextLevelGoal)*100)}% COMPLETE</span>
                        </div>
                        <div style={{fontSize: '32px', fontWeight: '800'}}>₿ {money.toLocaleString()}</div>
                        <div className="xp-bar-bg">
                            <div className="xp-bar-fill" style={{width: `${(xp/nextLevelGoal)*100}%`}}></div>
                        </div>
                        <div style={{fontSize: '10px', opacity: 0.6}}>XP TO NEXT LEVEL: {nextLevelGoal - xp}</div>
                    </div>

                    <div className="grid">
                        {grid.map((cell, i) => (
                            <div key={i} className="tile" onClick={() => build(i)}>
                                {cell && <div className="bld-wrapper"><span className="bld-icon">{cell.icon}</span></div>}
                            </div>
                        ))}
                    </div>

                    <div className="toolbar">
                        {Object.entries(items).map(([id, data]) => (
                            <button key={id} 
                                className={`tool-btn ${activeTool === id ? 'active' : ''} ${lvl < data.req ? 'locked' : ''}`}
                                onClick={() => lvl >= data.req && setActiveTool(id)}>
                                <span style={{fontSize: '28px'}}>{lvl < data.req ? '🔒' : data.icon}</span>
                                <span style={{fontSize: '10px', fontWeight: '800', marginTop: '5px'}}>{data.name}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<CityGame />);
    </script>
</body>
</html>
