<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityOS Core - Production Build</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --accent: #38bdf8; }
        body { margin: 0; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow: hidden; }
        #root { height: 100vh; display: flex; flex-direction: column; }
        
        /* 3D Scene */
        .scene { flex: 1; perspective: 1200px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        .grid { 
            display: grid; grid-template-columns: repeat(10, 50px); grid-template-rows: repeat(10, 50px);
            transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d;
            border: 2px solid rgba(56, 189, 248, 0.2); background: rgba(255,255,255,0.05);
        }
        .cell { 
            width: 50px; height: 50px; border: 0.5px solid rgba(255,255,255,0.1); 
            transition: all 0.2s; cursor: pointer; position: relative;
        }
        .cell:hover { background: rgba(56, 189, 248, 0.3); transform: translateZ(5px); }
        
        /* Building Visuals */
        .building { 
            position: absolute; bottom: 0; width: 100%; height: 100%; 
            background-size: cover; transform: rotateZ(45deg) rotateX(-60deg) translateY(-25px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { transform: scale(0) rotateZ(45deg); } to { transform: scale(1) rotateZ(45deg); } }

        /* HUD */
        .hud { position: absolute; top: 20px; left: 20px; background: var(--card); padding: 20px; border-radius: 16px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 220px; }
        .toolbar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 12px; border-radius: 24px; display: flex; gap: 15px; backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.3); }
        .tool { width: 60px; height: 60px; border-radius: 16px; border: none; background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 5px; transition: 0.3s; }
        .tool.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const CityGame = () => {
            const [money, setMoney] = useState(10000);
            const [population, setPopulation] = useState(0);
            const [grid, setGrid] = useState(Array(100).fill(null));
            const [activeTool, setActiveTool] = useState('RES');

            const tools = [
                { id: 'RES', name: 'House', cost: 500, pop: 10, icon: '🏠' },
                { id: 'IND', name: 'Factory', cost: 1500, pop: 0, icon: '🏭' },
                { id: 'PARK', name: 'Park', cost: 800, pop: 2, icon: '🌳' }
            ];

            const placeBuilding = (index) => {
                const tool = tools.find(t => t.id === activeTool);
                if (grid[index]) return; // Pehle se building hai
                if (money < tool.cost) return; // Paise kam hain

                const newGrid = [...grid];
                newGrid[index] = { ...tool };
                setGrid(newGrid);
                setMoney(prev => prev - tool.cost);
                setPopulation(prev => prev + tool.pop);
            };

            return (
                <div style={{height: '100%'}}>
                    <div className="hud">
                        <div style={{fontSize: '12px', opacity: 0.7}}>TREASURY</div>
                        <div style={{fontSize: '24px', fontWeight: '800', color: '#38bdf8'}}>${money.toLocaleString()}</div>
                        <div style={{marginTop: '15px', fontSize: '12px', opacity: 0.7}}>POPULATION</div>
                        <div style={{fontSize: '20px', fontWeight: '600'}}>{population}</div>
                    </div>

                    <div className="scene">
                        <div className="grid">
                            {grid.map((cell, i) => (
                                <div key={i} className="cell" onClick={() => placeBuilding(i)}>
                                    {cell && <div className="building" style={{fontSize: '30px', textAlign: 'center'}}>{cell.icon}</div>}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="toolbar">
                        {tools.map(t => (
                            <button 
                                key={t.id} 
                                className={`tool ${activeTool === t.id ? 'active' : ''}`}
                                onClick={() => setActiveTool(t.id)}
                            >
                                <span>{t.icon}</span>
                                <span>{t.name}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CityGame />);
    </script>
</body>
</html>
