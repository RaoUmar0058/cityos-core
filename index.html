<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityOS v5 — Smart Simulator</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #6366f1; --acc: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Layout CSS styling based on your theme rules */
        .app-container { display: flex; height: 100vh; width: 100vw; transition: background 0.5s ease; }
        .sidebar { width: 280px; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; backdrop-filter: blur(20px); border-right: 1px solid; transition: all 0.5s; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; backdrop-filter: blur(10px); z-index: 10; }
        
        /* 3D Isometric Viewport Grid */
        .world-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }
        .grid-isometric { display: grid; grid-template-columns: repeat(10, var(--cell-size, 45px)); grid-template-rows: repeat(10, var(--cell-size, 45px)); gap: 4px; transform: rotateX(55deg) rotateZ(-45deg); transform-style: preserve-3d; transition: all 0.4s ease; padding: 20px; }
        
        /* Animation & Tooltip rules */
        .bld-btn { width: 100%; border: none; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s; }
        .bld-btn:hover:not(:disabled) { transform: translateX(3px); }
        
        @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }
        @keyframes tooltipIn { from { opacity: 0; transform: translateX(-50%) translateY(5px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Extracting components from Recharts Global object for browser-compatible execution
        const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip: ChartTooltip, RadarChart, Radar, PolarGrid, PolarAngleAxis } = Recharts;
        const { useState, useEffect, useCallback, useRef } = React;

        // ═══════════════════════════════════════════════════════════════
        // ENGINE DATA & CONSTANTS FROM YOUR ORIGINAL CODE
        // ═══════════════════════════════════════════════════════════════
        const GRID_COLS = 10;
        const GRID_SIZE = GRID_COLS * GRID_COLS;
        const SAVE_KEY  = "cityos_v5";
        const STARTING_COINS = 800;

        const BUILDINGS = {
          TREE:     { id:"TREE",     label:"Oak Tree",      icon:"🌳", cost:20,  beauty:10, oxygen:8,  pollution:-6,  traffic:0,  energy:2,  population:0,  color:"#4ade80", unlockAt:0,  tier:1 },
          ROAD:     { id:"ROAD",     label:"Smart Road",    icon:"🛣️", cost:30,  beauty:2,  oxygen:-2, pollution:4,   traffic:-10,energy:-2, population:0,  color:"#94a3b8", unlockAt:0,  tier:1 },
          HOUSE:    { id:"HOUSE",    label:"Modern Villa",  icon:"🏠", cost:100, beauty:15, oxygen:-1, pollution:3,   traffic:4,  energy:-5, population:15, color:"#60a5fa", unlockAt:0,  tier:1 },
          PARK:     { id:"PARK",     label:"City Park",     icon:"🌿", cost:50,  beauty:20, oxygen:12, pollution:-10, traffic:-3, energy:3,  population:5,  color:"#86efac", unlockAt:0,  tier:1 },
          SOLAR:    { id:"SOLAR",    label:"Solar Farm",    icon:"☀️", cost:120, beauty:5,  oxygen:4,  pollution:-15, traffic:0,  energy:25, population:2,  color:"#fbbf24", unlockAt:5,  tier:2 },
          FACTORY:  { id:"FACTORY",  label:"Factory",       icon:"🏭", cost:150, beauty:-5, oxygen:-12,pollution:18,  traffic:8,  energy:15, population:10, color:"#fb923c", unlockAt:5,  tier:2 },
          HOSPITAL: { id:"HOSPITAL", label:"Health Center", icon:"🏥", cost:200, beauty:8,  oxygen:2,  pollution:-4,  traffic:6,  energy:-8, population:25, color:"#f43f5e", unlockAt:8,  tier:2 },
          SCHOOL:   { id:"SCHOOL",   label:"Academy",       icon:"🏫", cost:180, beauty:12, oxygen:3,  pollution:-3,  traffic:4,  energy:-6, population:12, color:"#c084fc", unlockAt:8,  tier:2 },
          MOSQUE:   { id:"MOSQUE",   label:"Grand Mosque",  icon:"🕌", cost:250, beauty:30, oxygen:2,  pollution:-2,  traffic:3,  energy:-3, population:8,  color:"#a78bfa", unlockAt:12, tier:3 },
          TOWER:    { id:"TOWER",    label:"Cyber Tower",   icon:"🏙️", cost:300, beauty:20, oxygen:-5, pollution:8,   traffic:10, energy:-15,population:50, color:"#38bdf8", unlockAt:12, tier:3 },
          FASHION:  { id:"FASHION",  label:"Fashion Hub ✦", icon:"👗", cost:400, beauty:40, oxygen:1,  pollution:-5,  traffic:8,  energy:-10,population:30, color:"#f472b6", unlockAt:15, tier:3 },
        };

        const MISSIONS = [
          { id:"m1", title:"Green Starter",    desc:"Plant 3 Trees",            icon:"🌳", check:(g,s)=>g.filter(c=>c==="TREE").length>=3,   reward:100, xp:50  },
          { id:"m2", title:"Clean Air Act",    desc:"Reduce pollution below 35%", icon:"💨", check:(g,s)=>s.pollution<35,                       reward:150, xp:80  },
          { id:"m3", title:"City Builder",     desc:"Reach 50 population",        icon:"👥", check:(g,s)=>s.population>=50,                     reward:200, xp:100 },
          { id:"m4", title:"Energy Surplus",   desc:"Energy above 60%",           icon:"⚡", check:(g,s)=>s.energy>60,                         reward:180, xp:90  },
          { id:"m5", title:"Beautiful City",   desc:"Beauty score above 60%",     icon:"✨", check:(g,s)=>s.beauty>60,                         reward:200, xp:100 },
          { id:"m6", title:"Mega City",        desc:"Reach 150 population",       icon:"🏙️", check:(g,s)=>s.population>=150,                    reward:500, xp:250 },
          { id:"m7", title:"Eco Champion",     desc:"Sustainability above 75%",   icon:"🌱", check:(g,s)=>s.sustainability>75,                  reward:400, xp:200 },
          { id:"m8", title:"Fashion Forward",  desc:"Place Fashion Hub",          icon:"👗", check:(g,s)=>g.some(c=>c==="FASHION"),             reward:600, xp:300 },
        ];

        const ACHIEVEMENTS = [
          { id:"a1", icon:"🏆", title:"First Block",    desc:"Place your first block", check:(moves)=>moves>=1   },
          { id:"a2", icon:"🌟", title:"10 Moves",       desc:"Make 10 moves",          check:(moves)=>moves>=10  },
          { id:"a3", icon:"💎", title:"Veteran Planner",desc:"Make 25 moves",          check:(moves)=>moves>=25  },
          { id:"a4", icon:"👑", title:"City Master",    desc:"Make 50 moves",          check:(moves)=>moves>=50  },
        ];

        const THEMES = {
          light: {
            bg:         "linear-gradient(160deg,#f0f4ff 0%,#fafafe 45%,#f5f0ff 100%)",
            sidebar:    "rgba(255,255,255,0.75)", sidebarBdr: "rgba(99,102,241,0.10)",
            glass:      "rgba(255,255,255,0.82)", glassBdr:   "rgba(99,102,241,0.12)",
            gridBg:     "rgba(241,245,249,0.82)", gridBdr:    "rgba(255,255,255,0.92)",
            cellTop:    "#f1f5f9", cellLeft:"#dde6f0", cellRight:"#c8d5e8",
            text:       "#1e1b4b", textSub:"#475569", textMuted:"#94a3b8",
            divider:    "rgba(0,0,0,0.06)", barBg:"rgba(0,0,0,0.06)", chartCard:  "rgba(255,255,255,0.78)",
            emojiShadow:"drop-shadow(0 5px 8px rgba(0,0,0,0.18))", gridFilter: "none",
          },
          dark: {
            bg:         "linear-gradient(160deg,#060912 0%,#0f172a 55%,#0c0a1e 100%)",
            sidebar:    "rgba(8,12,28,0.97)", sidebarBdr: "rgba(99,102,241,0.18)",
            glass:      "rgba(8,12,28,0.88)", glassBdr:   "rgba(99,102,241,0.18)",
            gridBg:     "rgba(8,12,28,0.78)", gridBdr:    "rgba(99,102,241,0.14)",
            cellTop:    "#1a2540", cellLeft:"#121c32", cellRight:"#0d1626",
            text:       "#f1f5f9", textSub:"#94a3b8", textMuted:"#475569",
            divider:    "rgba(255,255,255,0.05)", barBg:"rgba(255,255,255,0.06)", chartCard:  "rgba(255,255,255,0.03)",
            emojiShadow:"drop-shadow(0 0 12px rgba(99,102,241,0.65)) drop-shadow(0 5px 10px rgba(0,0,0,0.6))", gridFilter: "saturate(1.25) brightness(1.06)",
          }
        };

        function computeStats(grid) {
          let oxygen=40, beauty=30, pollution=20, traffic=30, energy=50, population=0, score=0;
          grid.forEach(cell => {
            if(!cell) return;
            const b = BUILDINGS[cell];
            if(!b) return;
            oxygen = Math.max(0, Math.min(100, oxygen + b.oxygen));
            beauty = Math.max(0, Math.min(100, beauty + b.beauty));
            pollution = Math.max(0, Math.min(100, pollution + b.pollution));
            traffic = Math.max(0, Math.min(100, traffic + b.traffic));
            energy = Math.max(0, Math.min(100, energy + b.energy));
            population += b.population; 
            score += 10 + b.beauty;
          });
          const livability = Math.round((oxygen + beauty + (100 - pollution) + (100 - traffic) + energy) / 5);
          const sustainability = Math.round(oxygen * 0.35 + (100 - pollution) * 0.35 + energy * 0.3);
          return { oxygen, beauty, pollution, traffic, energy, population, score, livability, sustainability };
        }

        // ═══════════════════════════════════════════════════════════════
        // SEPARATE UI HELPER SUB-COMPONENTS
        // ═══════════════════════════════════════════════════════════════
        function DayNightToggle({ isNight, onToggle }) {
          return (
            <button onClick={onToggle} style={{
              width:60, height:28, borderRadius:99,
              background:isNight?"linear-gradient(135deg,#0f172a,#1e293b)":"linear-gradient(135deg,#dbeafe,#bfdbfe)",
              border:`1px solid ${isNight?"rgba(99,102,241,0.35)":"rgba(147,197,253,0.5)"}`,
              position:"relative", cursor:"pointer", padding:0, flexShrink:0, transition:"all 0.55s ease",
            }}>
              <div style={{
                position:"absolute", top:2, left:isNight?33:3, width:22, height:22, borderRadius:"50%",
                background:isNight?"linear-gradient(135deg,#e2e8f0,#cbd5e1)":"linear-gradient(135deg,#fde68a,#f59e0b)",
                transition:"all 0.4s cubic-bezier(0.34,1.56,0.64,1)",
                display:"flex", alignItems:"center", justifyCenter:"center", fontSize:11, paddingLeft: isNight?2:3, paddingTop:1
              }}>{isNight?"🌙":"☀️"}</div>
            </button>
          );
        }

        function BlockTooltip({ building }) {
          const b = BUILDINGS[building];
          if(!b) return null;
          const rows=[
            {k:"Beauty",v:b.beauty,pos:b.beauty>0},{k:"Oxygen",v:b.oxygen,pos:b.oxygen>0},
            {k:"Pollution",v:b.pollution,pos:b.pollution<0},{k:"Traffic",v:b.traffic,pos:b.traffic<0},
            {k:"Energy",v:b.energy,pos:b.energy>0},{k:"Pop.",v:b.population,pos:b.population>0},
          ].filter(r=>r.v!==0);
          return (
            <div style={{
              position:"absolute", bottom:"calc(100% + 8px)", left:"50%", transform:"translateX(-50%)",
              background:"rgba(6,9,18,0.95)", border:`1px solid ${b.color}77`, borderRadius:8, padding:8, minWidth:120, zIndex:999, pointerEvents:"none",
            }}>
              <div style={{fontSize:9, fontWeight:800, color:b.color, marginBottom:4}}>{b.label}</div>
              <div style={{fontSize:9, color:"#94a3b8", marginBottom:4}}>💰 Cost: {b.cost}</div>
              {rows.map(r=>(
                <div key={r.k} style={{display:"flex", justifyContent:"space-between", fontSize:8, marginBottom:2}}>
                  <span style={{color:"#64748b"}}>{r.k}</span>
                  <span style={{fontWeight:700, color:r.pos?"#4ade80":"#f87171"}}>{r.v>0?"+":""}{r.v}</span>
                </div>
              ))}
            </div>
          );
        }

        function IsoCell({ building, selected, onClick, onRightClick, isNight, t, locked, sizePx }) {
          const [hov, setHov] = useState(false);
          const b = building ? BUILDINGS[building] : null;
          const sel = BUILDINGS[selected];
          
          return (
            <div 
              className="tile-container"
              style={{ position:"relative", width:sizePx, height:sizePx }}
              onMouseEnter={() => setHov(true)}
              onMouseLeave={() => setHov(false)}
              onClick={locked ? undefined : onClick}
              onContextMenu={(e) => { e.preventDefault(); if(!locked) onRightClick(); }}
            >
              <div style={{ position:"absolute", inset:0, transform:"rotateX(52deg)", transformStyle:"preserve-3d" }}>
                <div style={{
                  position:"absolute", inset:0, borderRadius: 4,
                  background: hov && !building ? `${sel.color}33` : building ? (isNight?"#1e293b":"#f1f5f9") : t.cellTop,
                  border: `1px solid ${hov ? (b||sel).color : (isNight?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.08)")}`,
                  transition: "all 0.15s"
                }}/>
                <div style={{ position:"absolute", bottom:-5, left:0, right:"50%", height:5, background:t.cellLeft, transformOrigin:"top", transform:"rotateX(-90deg) translateY(-50%)" }}/>
                <div style={{ position:"absolute", bottom:-5, left:"50%", right:0, height:5, background:t.cellRight, transformOrigin:"top", transform:"rotateX(-90deg) translateY(-50%)" }}/>
              </div>
              <div style={{
                position:"absolute", inset:0, display:"flex", alignItems:"center(), justify-content:center", justifyContent:"center",
                fontSize: sizePx * 0.55, zIndex:2, transform: hov ? "translateY(-5px)" : "translateY(-1px)", transition:"all 0.2s",
                filter: building ? "drop-shadow(0 4px 6px rgba(0,0,0,0.25))" : "none"
              }}>{building ? b.icon : (hov && !locked ? sel.icon : "")}</div>
              {hov && building && <BlockTooltip building={building} />}
            </div>
          );
        }

        function StatBar({ label, val, color, icon, t }) {
          return (
            <div style={{ marginBottom:6 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginBottom:2 }}>
                <span style={{ color:t.textSub }}>{icon} {label}</span>
                <span style={{ fontWeight:700, color }}>{Math.round(val)}%</span>
              </div>
              <div style={{ background:t.barBg, height:4, borderRadius:4, overflow:"hidden" }}>
                <div style={{ width:`${Math.max(0, Math.min(100, val))}%`, height:"100%", background:color, transition:"width 0.4s" }}/>
              </div>
            </div>
          );
        }

        // ═══════════════════════════════════════════════════════════════
        // MAIN SMART CITY CONTROLLER MAIN COMPONENT
        // ═══════════════════════════════════════════════════════════════
        const CityApp = () => {
          const [themeMode, setThemeMode] = useState("dark");
          const [grid, setGrid] = useState(() => {
            const saved = localStorage.getItem(SAVE_KEY);
            return saved ? JSON.parse(saved).grid : Array(GRID_SIZE).fill(null);
          });
          const [coins, setCoins] = useState(() => {
            const saved = localStorage.getItem(SAVE_KEY);
            return saved ? JSON.parse(saved).coins : STARTING_COINS;
          });
          const [moveCount, setMoveCount] = useState(() => {
            const saved = localStorage.getItem(SAVE_KEY);
            return saved ? JSON.parse(saved).moveCount : 0;
          });
          
          const [selected, setSelected] = useState("TREE");
          const [tab, setTab] = useState("build");
          const [history, setHistory] = useState([]);
          const [future, setFuture] = useState([]);

          const t = THEMES[themeMode];
          const stats = computeStats(grid);
          const level = Math.floor(moveCount / 10) + 1;
          const xp = moveCount * 15;
          const xpPct = (xp % 200) / 2;

          useEffect(() => {
            localStorage.setItem(SAVE_KEY, JSON.stringify({ grid, coins, moveCount }));
          }, [grid, coins, moveCount]);

          const buildCell = (index) => {
            const b = BUILDINGS[selected];
            if (grid[index] === selected) return;
            if (coins < b.cost && !grid[index]) return;

            setHistory(prev => [...prev, { grid, coins, moveCount }]);
            setFuture([]);

            const newGrid = [...grid];
            let coinDiff = 0;

            if (newGrid[index]) {
              const oldB = BUILDINGS[newGrid[index]];
              coinDiff += Math.round(oldB.cost * 0.5); // 50% refund
            }
            
            coinDiff -= b.cost;
            newGrid[index] = selected;

            setGrid(newGrid);
            setCoins(c => c + coinDiff);
            setMoveCount(m => m + 1);
          };

          const removeCell = (index) => {
            if (!grid[index]) return;
            setHistory(prev => [...prev, { grid, coins, moveCount }]);
            
            const newGrid = [...grid];
            const oldB = BUILDINGS[newGrid[index]];
            
            newGrid[index] = null;
            setGrid(newGrid);
            setCoins(c => c + Math.round(oldB.cost * 0.5));
            setMoveCount(m => m + 1);
          };

          const undo = () => {
            if (!history.length) return;
            const previous = history[history.length - 1];
            setFuture(prev => [{ grid, coins, moveCount }, ...prev]);
            setGrid(previous.grid);
            setCoins(previous.coins);
            setMoveCount(previous.moveCount);
            setHistory(prev => prev.slice(0, -1));
          };

          const resetGame = () => {
            if(window.confirm("Kya aap poori city clear karna chahte hain?")) {
              setGrid(Array(GRID_SIZE).fill(null));
              setCoins(STARTING_COINS);
              setMoveCount(0);
              setHistory([]);
              setFuture([]);
            }
          };

          // Filtering checked tasks
          const completedM = MISSIONS.filter(m => m.check(grid, stats)).map(m => m.id);

          // Charts Mapping Data Structs
          const barData = [
            { name: 'Oxygen', value: stats.oxygen },
            { name: 'Beauty', value: stats.beauty },
            { name: 'Energy', value: stats.energy },
            { name: 'Traffic', value: stats.traffic },
            { name: 'Pollution', value: stats.pollution }
          ];

          return (
            <div className="app-container" style={{ background: t.bg, color: t.text }}>
              
              {/* LEFT DASHBOARD PANEL */}
              <div className="sidebar" style={{ background: t.sidebar, borderColor: t.sidebarBdr }}>
                <div>
                  <h2 style={{ fontFamily:"'Syne', sans-serif", fontSize:20, fontWeight:800 }}>{themeMode === 'dark' ? "🌃" : "🌆"} CityOS Core</h2>
                  <p style={{ fontSize:9, color:t.textMuted, fontFamily:"'DM Mono'", letterSpacing:1 }}>VERSION 5.0 LIVE</p>
                </div>

                {/* Level Progress */}
                <div style={{ background:"rgba(99,102,241,0.08)", padding:10, borderRadius:12, border:"1px solid rgba(99,102,241,0.2)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, fontWeight:700, color:"#6366f1", marginBottom:4 }}>
                    <span>PLANNER LEVEL {level}</span>
                    <span>{xp % 200}/200 XP</span>
                  </div>
                  <div style={{ background:"rgba(255,255,255,0.1)", height:5, borderRadius:99, overflow:"hidden" }}>
                    <div style={{ width:`${xpPct}%`, height:"100%", background:"#6366f1" }}/>
                  </div>
                </div>

                {/* Budget Indicator */}
                <div style={{ background: "linear-gradient(135deg,#4f46e5,#7c3aed)", padding:12, borderRadius:14, color:"#fff" }}>
                  <span style={{ fontSize:9, opacity:0.7, fontFamily:"'DM Mono'" }}>AVAILABLE CASH</span>
                  <h2 style={{ fontSize:24, fontWeight:800 }}>💰 {coins} Coins</h2>
                  <div style={{ display:"flex", gap:15, marginTop:8, fontSize:10, opacity:0.9 }}>
                    <div>👥 Pop: <b>{stats.population}</b></div>
                    <div>⚡ Score: <b>{stats.score}</b></div>
                    <div>🛠️ Moves: <b>{moveCount}</b></div>
                  </div>
                </div>

                {/* Livability Status */}
                <div style={{ background: t.chartCard, padding:10, borderRadius:12, border:`1px solid ${t.glassBdr}` }}>
                  <span style={{ fontSize:9, color:t.textMuted }}>LIVABILITY INDEX</span>
                  <h3 style={{ fontSize:18, color:"#10b981", fontFamily:"'Syne'" }}>{stats.livability}% 🌟 Excellent</h3>
                </div>

                {/* Core System Control Buttons */}
                <div style={{ display:"flex", gap:4 }}>
                  <button onClick={undo} disabled={!history.length} style={{ flex:1, padding:6, fontSize:10, borderRadius:6, cursor:"pointer" }}>↩ Undo</button>
                  <button onClick={resetGame} style={{ flex:1, padding:6, fontSize:10, borderRadius:6, cursor:"pointer", background:"#ef4444", color:"#fff", border:"none" }}>🔄 Clear All</button>
                </div>

                {/* Navigation Menu Tabs */}
                <div style={{ display:"flex", gap:4, background:"rgba(0,0,0,0.1)", padding:2, borderRadius:8 }}>
                  {["build", "missions", "analytics"].map(tb => (
                    <button key={tb} onClick={() => setTab(tb)} style={{ flex:1, padding:"6px 2px", fontSize:10, textTransform:"capitalize", background: tab===tb ? "#6366f1" : "transparent", color: tab===tb ? "#fff" : t.textSub, border:"none", borderRadius:6, cursor:"pointer" }}>{tb}</button>
                  ))}
                </div>

                {/* BUILD TAB INTERFACE */}
                {tab === "build" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:5, overflowY:"auto", maxHeight:"40vh" }}>
                    {Object.values(BUILDINGS).map(b => {
                      const active = selected === b.id;
                      const locked = b.unlockAt > moveCount;
                      return (
                        <button key={b.id} className="bld-btn" onClick={() => setSelected(b.id)} disabled={locked} style={{
                          padding:8, borderRadius:10, border: active ? `2px solid ${b.color}` : "1px solid rgba(0,0,0,0.05)",
                          background: active ? `${b.color}15` : t.chartCard, color: t.text, opacity: locked ? 0.4 : 1, textAlign:"left"
                        }}>
                          <span>{b.icon} <b>{b.label}</b></span>
                          <span style={{ fontSize:9, float:"right", color: locked ? "#ef4444" : "#10b981", fontFamily:"'DM Mono'" }}>{locked ? `🔒 Move ${b.unlockAt}` : `💰 ${b.cost}`}</span>
                        </button>
                      );
                    })}
                  </div>
                )}

                {/* MISSIONS TAB INTERFACE */}
                {tab === "missions" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:6, marginTop:5 }}>
                    {MISSIONS.map(m => {
                      const isDone = completedM.includes(m.id);
                      return (
                        <div key={m.id} style={{ padding:8, borderRadius:10, background: isDone ? "rgba(16,185,129,0.1)" : t.chartCard, border: `1px solid ${isDone ? "#10b981":"rgba(0,0,0,0.05)"}` }}>
                          <div style={{ fontSize:11, fontWeight:700, color: isDone ? "#10b981" : t.text }}>{m.icon} {m.title} {isDone ? "✓" : ""}</div>
                          <div style={{ fontSize:9, color:t.textMuted }}>{m.desc} (+💰{m.reward})</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* ANALYTICS TAB GRAPH INTERFACE */}
                {tab === "analytics" && (
                  <div style={{ marginTop:5, display:"flex", flexDirection:"column", gap:10 }}>
                    <div style={{ background: t.chartCard, padding:8, borderRadius:10 }}>
                      <span style={{ fontSize:10, fontWeight:700 }}>Metrics Radar Overview</span>
                      <div style={{ width: '100%', height: 140 }}>
                        <ResponsiveContainer>
                          <BarChart data={barData} margin={{ top: 10, right: 10, left: -30, bottom: 0 }}>
                            <XAxis dataKey="name" stroke={t.textSub} style={{ fontSize: 8 }} />
                            <YAxis stroke={t.textSub} style={{ fontSize: 8 }} />
                            <Bar dataKey="value" fill="#6366f1" radius={[4, 4, 0, 0]} />
                          </BarChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                    <div>
                      <StatBar label="Sustainability" val={stats.sustainability} color="#10b981" icon="🌱" t={t} />
                      <StatBar label="Pollution Index" val={stats.pollution} color="#f97316" icon="💨" t={t} />
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT VIEWPORT VIEW (THE 3D GRID WORLD) */}
              <div className="main-content">
                <div className="top-bar" style={{ background: t.glass, borderColor: t.glassBdr }}>
                  <div style={{ fontSize:12, fontWeight:600 }}>🌟 Environment Performance Matrix</div>
                  <DayNightToggle isNight={themeMode === "dark"} onToggle={() => setThemeMode(themeMode === "dark" ? "light" : "dark")} />
                </div>

                <div className="world-container">
                  <div className="grid-isometric" style={{ filter: t.gridFilter }}>
                    {grid.map((cell, idx) => (
                      <IsoCell 
                        key={idx} 
                        building={cell} 
                        selected={selected} 
                        isNight={themeMode === "dark"} 
                        t={t} 
                        sizePx={44}
                        onClick={() => buildCell(idx)}
                        onRightClick={() => removeCell(idx)}
                        locked={false}
                      />
                    ))}
                  </div>
                </div>
              </div>

            </div>
          );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<CityApp />);
    </script>
</body>
</html>
