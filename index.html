<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityOS v5 - Smart City Simulator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #060912; font-family: 'DM Sans', sans-serif; overflow-x: hidden; color: #f1f5f9; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ═══════════════════════════════════════════════════════════════
        // ENGINE GAME DATA CONFIGURATIONS
        // ═══════════════════════════════════════════════════════════════
        const GRID_COLS = 10;
        const GRID_SIZE = GRID_COLS * GRID_COLS;
        const SAVE_KEY  = "cityos_v5_save";
        const STARTING_COINS = 800;

        const BUILDINGS = {
          TREE:     { id:"TREE",     label:"Oak Tree",      icon:"🌳", cost:20,  beauty:10, oxygen:8,  pollution:-6,  traffic:0,  energy:2,  population:0,  color:"#4ade80", unlockAt:0 },
          ROAD:     { id:"ROAD",     label:"Smart Road",    icon:"🛣️", cost:30,  beauty:2,  oxygen:-2, pollution:4,   traffic:-10,energy:-2, population:0,  color:"#94a3b8", unlockAt:0 },
          HOUSE:    { id:"HOUSE",    label:"Modern Villa",  icon:"🏠", cost:100, beauty:15, oxygen:-1, pollution:3,   traffic:4,  energy:-5, population:15, color:"#60a5fa", unlockAt:0 },
          PARK:     { id:"PARK",     label:"City Park",     icon:"🌿", cost:50,  beauty:20, oxygen:12, pollution:-10, traffic:-3, energy:3,  population:5,  color:"#86efac", unlockAt:0 },
          SOLAR:    { id:"SOLAR",    label:"Solar Farm",    icon:"☀️", cost:120, beauty:5,  oxygen:4,  pollution:-15, traffic:0,  energy:25, population:2,  color:"#fbbf24", unlockAt:5 },
          FACTORY:  { id:"FACTORY",  label:"Factory",       icon:"🏭", cost:150, beauty:-5, oxygen:-12,pollution:18,  traffic:8,  energy:15, population:10, color:"#fb923c", unlockAt:5 },
          HOSPITAL: { id:"HOSPITAL", label:"Health Center", icon:"🏥", cost:200, beauty:8,  oxygen:2,  pollution:-4,  traffic:6,  energy:-8, population:25, color:"#f43f5e", unlockAt:8 },
          SCHOOL:   { id:"SCHOOL",   label:"Academy",       icon:"🏫", cost:180, beauty:12, oxygen:3,  pollution:-3,  traffic:4,  energy:-6, population:12, color:"#c084fc", unlockAt:8 },
          MOSQUE:   { id:"MOSQUE",   label:"Grand Mosque",  icon:"🕌", cost:250, beauty:30, oxygen:2,  pollution:-2,  traffic:3,  energy:-3, population:8,  color:"#a78bfa", unlockAt:12 },
          TOWER:    { id:"TOWER",    label:"Cyber Tower",   icon:"🏙️", cost:300, beauty:20, oxygen:-5, pollution:8,   traffic:10, energy:-15,population:50, color:"#38bdf8", unlockAt:12 },
          FASHION:  { id:"FASHION",  label:"Fashion Hub ✦", icon:"👗", cost:400, beauty:40, oxygen:1,  pollution:-5,  traffic:8,  energy:-10,population:30, color:"#f472b6", unlockAt:15 },
        };

        const MISSIONS = [
          { id:"m1", title:"Green Starter",    desc:"Plant 3 Trees",              icon:"🌳", check:(g,s)=>g.filter(c=>c==="TREE").length>=3,  reward:100, xp:50  },
          { id:"m2", title:"Clean Air Act",    desc:"Reduce pollution below 35%", icon:"💨", check:(g,s)=>s.pollution<35,                       reward:150, xp:80  },
          { id:"m3", title:"City Builder",     desc:"Reach 50 population",        icon:"👥", check:(g,s)=>s.population>=50,                  reward:200, xp:100 },
          { id:"m4", title:"Energy Surplus",   desc:"Energy above 60%",           icon:"⚡", check:(g,s)=>s.energy>60,                          reward:180, xp:90  },
          { id:"m5", title:"Beautiful City",   desc:"Beauty score above 60%",     icon:"✨", check:(g,s)=>s.beauty>60,                         reward:200, xp:100 },
        ];

        const THEMES = {
          dark: {
            bg: "linear-gradient(160deg,#060912 0%,#0f172a 55%,#0c0a1e 100%)",
            sidebar: "rgba(8,12,28,0.96)",
            sidebarBdr: "rgba(99,102,241,0.15)",
            gridBg: "rgba(8,12,28,0.75)",
            gridBdr: "rgba(99,102,241,0.12)",
            cellTop: "#1a2540", cellLeft: "#121c32", cellRight: "#0d1626",
            text: "#f1f5f9", textSub: "#94a3b8", textMuted: "#475569",
            barBg: "rgba(255,255,255,0.06)",
            cardBg: "rgba(255,255,255,0.03)"
          },
          light: {
            bg: "linear-gradient(160deg,#f0f4ff 0%,#fafafe 45%,#f5f0ff 100%)",
            sidebar: "rgba(255,255,255,0.85)",
            sidebarBdr: "rgba(99,102,241,0.1)",
            gridBg: "rgba(241,245,249,0.85)",
            gridBdr: "rgba(255,255,255,0.9)",
            cellTop: "#f1f5f9", cellLeft: "#dde6f0", cellRight: "#c8d5e8",
            text: "#1e1b4b", textSub: "#475569", textMuted: "#94a3b8",
            barBg: "rgba(0,0,0,0.05)",
            cardBg: "rgba(0,0,0,0.02)"
          }
        };

        // ═══════════════════════════════════════════════════════════════
        // SOUND ENGINE CONTEXT
        // ═══════════════════════════════════════════════════════════════
        function playAudioTone(type) {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            const now = ctx.currentTime;

            if (type === "place") {
              osc.frequency.setValueAtTime(440, now);
              osc.frequency.exponentialRampToValueAtTime(660, now + 0.1);
              gain.gain.setValueAtTime(0.1, now);
              gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
              osc.start(now); osc.stop(now + 0.15);
            } else if (type === "remove") {
              osc.frequency.setValueAtTime(320, now);
              osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
              gain.gain.setValueAtTime(0.08, now);
              gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
              osc.start(now); osc.stop(now + 0.12);
            } else if (type === "mission") {
              osc.frequency.setValueAtTime(523, now);
              osc.frequency.setValueAtTime(659, now + 0.08);
              osc.frequency.setValueAtTime(784, now + 0.16);
              gain.gain.setValueAtTime(0.12, now);
              gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
              osc.start(now); osc.stop(now + 0.3);
            }
          } catch (e) {}
        }

        // Stats Engine Calculator
        function computeStats(grid) {
          let oxygen=40, beauty=30, pollution=20, traffic=30, energy=50, population=0, score=0;
          grid.forEach(cell => {
            if (!cell) return;
            const b = BUILDINGS[cell];
            oxygen = Math.max(0, Math.min(100, oxygen + b.oxygen));
            beauty = Math.max(0, Math.min(100, beauty + b.beauty));
            pollution = Math.max(0, Math.min(100, pollution + b.pollution));
            traffic = Math.max(0, Math.min(100, traffic + b.traffic));
            energy = Math.max(0, Math.min(100, energy + b.energy));
            population += b.population;
            score += 10 + b.beauty;
          });
          const livability = Math.round((oxygen + beauty + (100 - pollution) + (100 - traffic) + energy) / 5);
          const sustainability = Math.round(oxygen * 0.35 + (100 - pollution) * 0.35 + energy * 0.3);
          return { oxygen, beauty, pollution, traffic, energy, population, score, livability, sustainability };
        }

        // ═══════════════════════════════════════════════════════════════
        // MAIN APPLICATION UI ENGINE
        // ═══════════════════════════════════════════════════════════════
        function CityOSApp() {
          const [isNight, setIsNight] = useState(true);
          const [grid, setGrid] = useState(() => {
            try {
              const item = localStorage.getItem(SAVE_KEY);
              return item ? JSON.parse(item) : Array(GRID_SIZE).fill(null);
            } catch(e) { return Array(GRID_SIZE).fill(null); }
          });

          const [coins, setCoins] = useState(STARTING_COINS);
          const [moveCount, setMoveCount] = useState(0);
          const [xp, setXp] = useState(0);
          const [selected, setSelected] = useState("TREE");
          const [tab, setTab] = useState("build");
          const [completedM, setCompletedM] = useState([]);
          const [showAd, setShowAd] = useState(false);
          const [cellPx, setCellPx] = useState(42);

          const t = isNight ? THEMES.dark : THEMES.light;
          const stats = computeStats(grid);
          const level = Math.floor(xp / 200) + 1;
          const xpPct = ((xp % 200) / 200) * 100;

          // Sync Screen Responsiveness Window Resize
          useEffect(() => {
            function handleResize() {
              const width = window.innerWidth;
              if (width < 640) setCellPx(28);
              else if (width < 1024) setCellPx(36);
              else setCellPx(44);
            }
            handleResize();
            window.addEventListener("resize", handleResize);
            return () => window.removeEventListener("resize", handleResize);
          }, []);

          // Auto State Save Engine
          useEffect(() => {
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(grid)); } catch(e){}
          }, [grid]);

          // Real-time Mission Completer Rule engine
          useEffect(() => {
            let newlyDone = [];
            MISSIONS.forEach(m => {
              if (m.check(grid, stats) && !completedM.includes(m.id)) {
                newlyDone.push(m.id);
              }
            });
            if (newlyDone.length > 0) {
              setCompletedM(prev => [...prev, ...newlyDone]);
              setCoins(c => c + 150);
              setXp(x => x + 60);
              playAudioTone("mission");
            }
          }, [grid, stats, completedM]);

          const handleCellClick = (idx) => {
            const b = BUILDINGS[selected];
            if (grid[idx]) return; 
            if (coins < b.cost) return;

            const nextGrid = [...grid];
            nextGrid[idx] = selected;
            setGrid(nextGrid);
            setCoins(c => c - b.cost);
            setMoveCount(m => m + 1);
            setXp(x => x + 15);
            playAudioTone("place");
          };

          const handleCellRightClick = (idx, e) => {
            if(e) e.preventDefault();
            if (!grid[idx]) return;

            const nextGrid = [...grid];
            nextGrid[idx] = null;
            setGrid(nextGrid);
            setMoveCount(m => m + 1);
            playAudioTone("remove");
          };

          const triggerAdReward = () => {
            setShowAd(true);
            setTimeout(() => {
              setCoins(c => c + 250);
              setShowAd(false);
              playAudioTone("mission");
            }, 2000);
          };

          return (
            <div style={{
              display: "flex", flexDirection: window.innerWidth < 768 ? "column" : "row",
              minHeight: "100vh", background: t.bg, color: t.text, padding: "16px", gap: "16px"
            }}>
              
              {/* SIDEBAR DASHBOARD CONTROL */}
              <div style={{
                width: window.innerWidth < 768 ? "100%" : "300px", background: t.sidebar,
                border: `1px solid ${t.sidebarBdr}`, borderRadius: "16px", padding: "16px",
                display: "flex", flexDirection: "column", gap: "12px"
              }}>
                <div>
                  <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: "20px" }}>CityOS Simulator 🌆</h2>
                  <p style={{ fontSize: "10px", color: t.textMuted, fontFamily: "'DM Mono', monospace" }}>PORTFOLIO DATA INFRASTRUCTURE</p>
                </div>

                {/* LEVEL SUMMARY */}
                <div style={{ background: "rgba(99,102,241,0.08)", padding: "10px", borderRadius: "12px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:"10px", fontFamily:"'DM Mono',monospace" }}>
                    <span>PLANNER LEVEL {level}</span>
                    <span>{Math.round(xpPct)}%</span>
                  </div>
                  <div style={{ background: t.barBg, height: "4px", borderRadius: "99px", marginTop: "4px", overflow:"hidden" }}>
                    <div style={{ width: `${xpPct}%`, height: "100%", background: "#6366f1" }}/>
                  </div>
                </div>

                {/* STAT VALUES */}
                <div style={{ background: "#4f46e5", color: "#fff", padding: "12px", borderRadius: "12px" }}>
                  <div style={{ fontSize: "10px", opacity: 0.8 }}>BUDGET POOL</div>
                  <div style={{ fontSize: "24px", fontWeight: "800", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span>💰 {coins}</span>
                    <button onClick={triggerAdReward} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"#fff", fontSize:"10px", padding:"4px 8px", borderRadius:"6px", cursor:"pointer" }}>+ FUND</button>
                  </div>
                  <div style={{ display: "flex", gap: "10px", marginTop: "6px", fontSize: "10px", fontFamily: "'DM Mono', monospace" }}>
                    <span>MOVES: {moveCount}</span>
                    <span>POP: {stats.population}</span>
                  </div>
                </div>

                {/* LIVABILITY BAR METER */}
                <div style={{ border: `1px solid ${stats.livability > 50 ? "#4ade80" : "#fb923c"}`, padding: "8px 12px", borderRadius: "12px", fontSize: "13px" }}>
                  📊 Livability Score: <strong>{stats.livability}%</strong>
                </div>

                {/* TAB SWITCH SYSTEM */}
                <div style={{ display: "flex", background: "rgba(0,0,0,0.15)", borderRadius: "8px", padding: "2px" }}>
                  {["build", "missions", "metrics"].map(tb => (
                    <button key={tb} onClick={() => setTab(tb)} style={{
                      flex: 1, padding: "6px 0", fontSize: "11px", border: "none", borderRadius: "6px", cursor: "pointer",
                      background: tab === tb ? "#6366f1" : "transparent", color: tab === tb ? "#fff" : t.textSub
                    }}>{tb.toUpperCase()}</button>
                  ))}
                </div>

                {/* CONDITIONAL SUB MENU VIEW */}
                {tab === "build" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: "4px", maxHeight: "240px", overflowY: "auto" }}>
                    {Object.values(BUILDINGS).map(b => {
                      const active = selected === b.id;
                      const isLocked = b.unlockAt > moveCount;
                      return (
                        <button key={b.id} onClick={() => !isLocked && setSelected(b.id)} style={{
                          display: "flex", justifyContent: "space-between", padding: "8px", borderRadius: "8px",
                          border: active ? `1px solid ${b.color}` : "1px solid transparent", cursor: isLocked ? "not-allowed" : "pointer",
                          background: active ? "rgba(99,102,241,0.1)" : "transparent", opacity: isLocked ? 0.35 : 1
                        }}>
                          <span style={{ fontSize: "12px", color: t.text }}>{b.icon} {b.label} {isLocked && `🔒(Lvl ${b.unlockAt})`}</span>
                          <span style={{ fontSize: "11px", color: t.textMuted }}>💰{b.cost}</span>
                        </button>
                      );
                    })}
                  </div>
                )}

                {tab === "missions" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                    {MISSIONS.map(m => {
                      const isDone = completedM.includes(m.id);
                      return (
                        <div key={m.id} style={{ display:"flex", alignItems:"center", justifyValue:"space-between", padding:"6px", background: t.cardBg, borderRadius:"8px", justifyContent:"space-between" }}>
                          <span style={{ fontSize: "11px" }}>{m.icon} {m.title}</span>
                          <span style={{ fontSize: "10px", color: isDone ? "#4ade80" : t.textMuted }}>{isDone ? "✓ DONE" : `+💰${m.reward}`}</span>
                        </div>
                      );
                    })}
                  </div>
                )}

                {tab === "metrics" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: "6px", fontSize: "12px" }}>
                    <div>🌿 Oxygen: {stats.oxygen}%</div>
                    <div>✨ Beauty: {stats.beauty}%</div>
                    <div>💨 Pollution: {stats.pollution}%</div>
                    <div>🚦 Traffic: {stats.traffic}%</div>
                    <div>⚡ Energy: {stats.energy}%</div>
                  </div>
                )}

                {/* BOTTOM UTILITY FOOTER CONFIGS */}
                <div style={{ marginTop: "auto", display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "10px", borderTop: `1px solid ${t.sidebarBdr}` }}>
                  <button onClick={() => { if(window.confirm("Reset Grid?")){setGrid(Array(GRID_SIZE).fill(null)); setCoins(STARTING_COINS); setMoveCount(0); setXp(0);} }} style={{ background:"none", border:"none", color:"#f87171", cursor:"pointer", fontSize:"11px" }}>🔄 Wipe Reset</button>
                  <button onClick={() => setIsNight(!isNight)} style={{ background:"none", border:"none", color:t.textSub, cursor:"pointer", fontSize:"12px" }}>{isNight ? "☀️ Light Mode" : "🌙 Night Mode"}</button>
                </div>
              </div>

              {/* ISOMETRIC SIMULATION CANVAS CENTER */}
              <div style={{
                flex: 1, background: t.gridBg, border: `1px solid ${t.gridBdr}`, borderRadius: "16px",
                display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh", overflow: "hidden"
              }}>
                <div style={{
                  display: "grid", gridTemplateColumns: `repeat(${GRID_COLS}, ${cellPx}px)`, gap: "4px", padding: "20px"
                }}>
                  {grid.map((cell, idx) => {
                    const b = cell ? BUILDINGS[cell] : null;
                    return (
                      <div
                        key={idx}
                        onClick={() => handleCellClick(idx)}
                        onContextMenu={(e) => handleCellRightClick(idx, e)}
                        style={{
                          width: `${cellPx}px`, height: `${cellPx}px`, position: "relative",
                          cursor: "pointer", background: cell ? "#1e293b" : "rgba(255,255,255,0.02)",
                          border: `1px solid ${cell ? b.color : "rgba(255,255,255,0.05)"}`, borderRadius: "6px",
                          display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s"
                        }}
                      >
                        <span style={{ fontSize: `${cellPx * 0.55}px` }}>{cell ? b.icon : ""}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* FUND MODAL */}
              {showAd && (
                <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999 }}>
                  <div style={{ background:"#0f172a", border:"1px solid #6366f1", padding:"24px", borderRadius:"12px", textAlign:"center" }}>
                    <h4 style={{ color:"#fff" }}>Simulating Cyber Infrastructure Reward Ads...</h4>
                    <p style={{ fontSize:"11px", color:"#94a3b8", marginTop:"4px" }}>Synchronizing state ledger logs.</p>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CityOSApp />);
    </script>
</body>
</html>
