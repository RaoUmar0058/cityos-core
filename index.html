<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityOS Core — Final Stability Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #f43f5e; --acc: #10b981; --bg: #020617; --card: rgba(15, 23, 42, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* 3D Scene */
        .world { perspective: 1800px; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(8, 65px); grid-template-rows: repeat(8, 65px); gap: 6px; transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d; }
        .tile { width: 65px; height: 65px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; cursor: pointer; }
        .tile:hover { background: rgba(99, 102, 241, 0.2); transform: translateZ(5px); }

        /* HUD & Emergency Controls */
        .hud { position: fixed; top: 20px; left: 20px; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); min-width: 280px; z-index: 100; }
        .controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        
        .btn { border: none; padding: 12px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; color: white; }
        .btn-p { background: var(--p); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        .btn-restart { background: var(--s); box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* Building Animation */
        .bld-wrapper { position: absolute; transform: rotateZ(45deg) rotateX(-60deg) translateY(-25px); animation: pop 0.3s ease-out; }
        .bld-icon { font-size: 40px; filter: drop-shadow(0 15px 10px rgba(0,0,0,0.5)); }
        @keyframes pop { from { transform: rotateZ(45deg) rotateX(-60deg) scale(0); } }

        .toolbar { position: fixed; bottom: 30px; background: var(--card); padding: 12px; border-radius: 20px; display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; border: 2px solid transparent; cursor: pointer; min-width: 75px; text-align: center; }
        .item.active { border-color: var(--p); background: rgba(99, 102, 241, 0.15); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const CityGame = () => {
            const [lvl, setLvl] = useState(1);
            const [money, setMoney] = useState(50000); // Increased starting money
            const [grid, setGrid] = useState(Array(64).fill(null));
            const [progress, setProgress] = useState(0);
            const [tool, setTool] = useState('RES');
            const [isDone, setIsDone] = useState(false);

            const config = {
                1: { title: "Foundations", goal: 5, target: "RES", hint: "Build 5 Houses" },
                2: { title: "AI Hub", goal: 8, target: "LAB", hint: "Build 8 AI Labs" },
                3: { title: "Core City", goal: 10, target: "EIFFEL", hint: "Build 10 Eiffel Cores" }
            };

            const items = {
                RES: { name: 'House', cost: 1000, icon: '🏡' },
                LAB: { name: 'Lab', cost: 3000, icon: '🏭' },
                EIFFEL: { name: 'Eiffel', cost: 10000, icon: '🗼' }
            };

            const resetGame = () => {
                setGrid(Array(64).fill(null));
                setProgress(0);
                setIsDone(false);
            };

            const build = (idx) => {
                if (grid[idx] || money < items[tool].cost || isDone) return;
                
                const newGrid = [...grid];
                newGrid[idx] = items[tool];
                setGrid(newGrid);
                setMoney(m => m - items[tool].cost);
                
                if (tool === config[lvl].target) {
                    setProgress(prev => prev + 1);
                }
            };

            useEffect(() => {
                if (progress >= config[lvl].goal) setIsDone(true);
            }, [progress]);

            const nextLvl = () => {
                if (lvl < 3) {
                    setLvl(l => l + 1);
                    resetGame();
                }
            };

            return (
                <div className="world">
                    <div className="hud">
                        <div style={{color: 'var(--p)', fontWeight: 800, fontSize: '12px'}}>STAGE {lvl}: {config[lvl].title}</div>
                        <div style={{fontSize: '32px', fontWeight: 800}}>₿ {money.toLocaleString()}</div>
                        <div style={{background: 'rgba(255,255,255,0.05)', height: '8px', borderRadius: '4px', margin: '10px 0', overflow: 'hidden'}}>
                            <div style={{width: `${(progress/config[lvl].goal)*100}%`, height: '100%', background: 'var(--acc)', transition: '0.3s'}}></div>
                        </div>
                        <div style={{fontSize: '11px', opacity: 0.7}}>GOAL: {config[lvl].hint} ({progress}/{config[lvl].goal})</div>
                    </div>

                    <div className="controls">
                        <button className="btn btn-restart" onClick={resetGame}>Restart Level</button>
                        <button className="btn btn-p" disabled={!isDone} onClick={nextLvl}>Next Level →</button>
                    </div>

                    <div className="grid">
                        {grid.map((cell, i) => (
                            <div key={i} className="tile" onClick={() => build(i)}>
                                {cell && <div className="bld-wrapper"><span className="bld-icon">{cell.icon}</span></div>}
                            </div>
                        ))}
                    </div>

                    <div className="toolbar">
                        {Object.entries(items).map(([id, data]) => (
                            <div key={id} className={`item ${tool === id ? 'active' : ''}`} onClick={() => setTool(id)}>
                                <div style={{fontSize: '24px'}}>{data.icon}</div>
                                <div style={{fontSize: '10px', fontWeight: 800}}>{data.name}</div>
                            </div>
                        ))}
                    </div>

                    {isDone && (
                        <div style={{position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', z-index: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center'}}>
                            <div>
                                <h1 style={{fontSize: '48px', color: 'var(--acc)'}}>GOAL REACHED!</h1>
                                <button className="btn btn-p" style={{marginTop: '20px', padding: '15px 40px', fontSize: '20px'}} onClick={nextLvl}>Unlock Stage {lvl + 1}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<CityGame />);
    </script>
</body>
</html>
